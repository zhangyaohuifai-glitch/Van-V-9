function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 3000); }

function calcDistance(lat1, lon1, lat2, lon2) { const R = 6371000; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); return R * c; }
function encodeBase64(str) { const encoder = new TextEncoder(); const bytes = encoder.encode(str); let binary = ''; bytes.forEach(b => binary += String.fromCharCode(b)); return btoa(binary); }
function decodeBase64(str) { try { const binary = atob(str); const bytes = Uint8Array.from(binary, c => c.charCodeAt(0)); return new TextDecoder().decode(bytes); } catch(e) { return ''; } }

// ==================== 設備指紋 ====================
function collectDeviceInfo() {
  try { const parser = new UAParser(); const result = parser.getResult(); const raw = { device: result.device || { model: 'Unknown', type: 'Unknown' }, os: result.os || { name: 'Unknown', version: 'Unknown' }, browser: result.browser || { name: 'Unknown', version: 'Unknown' }, screen: { width: window.screen.width, height: window.screen.height }, language: navigator.language || 'Unknown', timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown', userAgent: navigator.userAgent || 'Unknown', timestamp: Date.now() }; return JSON.parse(JSON.stringify(raw)); } catch(e) { return { device: { model: 'Error' }, os: { name: 'Error' }, browser: { name: 'Error' }, screen: { width:0, height:0 }, language:'Error', timezone:'Error', userAgent:'Error', timestamp:Date.now() }; }
}
async function saveDeviceInfo(uid, phone, role) {
  if (!uid) return; const deviceInfo = collectDeviceInfo(); const deviceRef = db.ref('user_devices/' + uid);
  try { const snap = await deviceRef.once('value'); const existing = snap.val() || {}; let history = existing.history || []; const currentFingerprint = JSON.stringify(deviceInfo); const isDuplicate = history.some(item => JSON.stringify(item.deviceInfo) === currentFingerprint); if (!isDuplicate) { history.push({ deviceInfo, phone, role, timestamp: Date.now() }); if (history.length > 10) history = history.slice(-10); } await deviceRef.set({ latest: deviceInfo, phone, role, lastLogin: Date.now(), history }); } catch(e) { console.warn('儲存設備指紋失敗:', e); }
}

// ==================== 語音系統（即時靜音） ====================
let preferredVoice = null, voiceEnabled = true;
function stopAllMedia() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll('audio').forEach(audio => { if (!audio.paused) { audio.pause(); audio.currentTime = 0; } });
}
document.getElementById('global-voice-btn').addEventListener('click', function() {
  voiceEnabled = !voiceEnabled; this.textContent = voiceEnabled ? '🔊' : '🔇'; this.classList.toggle('muted');
  showToast(voiceEnabled ? '語音已開啟' : '語音已關閉'); if (!voiceEnabled) stopAllMedia();
});
function getCantoneseVoice() {
  if (preferredVoice) { const allVoices = window.speechSynthesis.getVoices(); if (allVoices.some(v => v.voiceURI === preferredVoice.voiceURI)) return preferredVoice; preferredVoice = null; }
  if (!window.speechSynthesis) return null; const voices = window.speechSynthesis.getVoices(); if (!voices || voices.length === 0) return null;
  const priorityOrder = [(v) => v.lang === 'zh-HK' && v.name.includes('Google'),(v) => v.lang === 'zh-HK' && v.name.includes('Microsoft'),(v) => v.lang === 'zh-HK' && (v.name.includes('自然') || v.name.includes('Ting-Ting')),(v) => v.lang === 'zh-HK',(v) => v.lang.startsWith('zh')];
  for (const condition of priorityOrder) { const found = voices.find(condition); if (found) { preferredVoice = found; return found; } } return null;
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { getCantoneseVoice(); }; if (window.speechSynthesis.getVoices().length > 0) getCantoneseVoice(); }
function speakCantonese(text) {
  if (!voiceEnabled || !window.speechSynthesis) return Promise.resolve();
  return new Promise((resolve) => { const utter = new SpeechSynthesisUtterance(text); utter.lang = 'zh-HK'; utter.rate = 0.9; utter.pitch = 1.0; const voice = getCantoneseVoice(); if (voice) utter.voice = voice; utter.onend = () => resolve(); utter.onerror = () => resolve(); window.speechSynthesis.speak(utter); });
}

// ==================== 錄音系統（防卡死） ====================
let activeMediaRecorder = null, activeStream = null, recordingTimer = null;
function forceStopRecording() {
  if (activeMediaRecorder && activeMediaRecorder.state === 'recording') { activeMediaRecorder.stop(); if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; } activeMediaRecorder = null; }
  clearInterval(recordingTimer); recordingTimer = null;
  document.querySelectorAll('.record-btn.recording').forEach(btn => btn.classList.remove('recording'));
  document.querySelectorAll('.record-timer').forEach(timer => { timer.style.display = 'none'; timer.textContent = '0s'; });
}
async function startRecording(btn, timerEl, callback) {
  forceStopRecording(); if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('不支援錄音'); return; }
  try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); activeStream = stream; const recorder = new MediaRecorder(stream); activeMediaRecorder = recorder; const chunks = []; recorder.ondataavailable = e => chunks.push(e.data); recorder.onstop = () => { const blob = new Blob(chunks, { type: 'audio/webm' }); const reader = new FileReader(); reader.onload = () => { const base64 = reader.result.split(',')[1]; if (callback) callback(base64); showToast('錄音完成'); }; reader.readAsDataURL(blob); btn.classList.remove('recording'); if (timerEl) { timerEl.style.display = 'none'; timerEl.textContent = '0s'; } clearInterval(recordingTimer); if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; } activeMediaRecorder = null; }; recorder.start(); btn.classList.add('recording'); let seconds = 0; if (timerEl) { timerEl.style.display = 'block'; timerEl.textContent = '0s'; } recordingTimer = setInterval(() => { seconds++; if (timerEl) timerEl.textContent = seconds + 's'; }, 1000); } catch (err) { showToast('無法開啟咪高峰'); }
}
function bindRecordBtn(btnId, timerId, callback) {
  const btn = document.getElementById(btnId); if (!btn) return; const timer = document.getElementById(timerId); let longPress = null;
  const start = (e) => { e.preventDefault(); if (activeMediaRecorder && activeMediaRecorder.state === 'recording') return; longPress = setTimeout(() => startRecording(btn, timer, callback), 300); };
  const stop = (e) => { e.preventDefault(); clearTimeout(longPress); if (activeMediaRecorder && activeMediaRecorder.state === 'recording') forceStopRecording(); };
  btn.addEventListener('pointerdown', start); btn.addEventListener('pointerup', stop); btn.addEventListener('pointerleave', stop); btn.addEventListener('pointercancel', stop);
  btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', stop); btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchstart', start, {passive: false}); btn.addEventListener('touchend', stop, {passive: false});
}

function cleanupOldMessages() { const cutoff = Date.now() - 7 * 24 * 3600 * 1000; db.ref('van/messages').once('value', snap => { snap.forEach(child => { const msg = child.val(); if (msg.timestamp && msg.timestamp < cutoff) child.ref.remove(); }); }); db.ref('van/walkie_talkie').once('value', snap => { snap.forEach(child => { const msg = child.val(); if (msg.timestamp && msg.timestamp < cutoff) child.ref.remove(); }); }); }

document.getElementById('admin-login-btn').addEventListener('click', async () => {
  const username = document.getElementById('admin-username').value.trim(); const password = document.getElementById('admin-password').value.trim(); const errEl = document.getElementById('admin-login-error');
  if (!username || !password) { errEl.textContent = '請填寫用戶名及密碼'; return; }
  try {
    if (await checkBanned(username, 'driver')) { errEl.textContent = '此帳號已被封鎖'; return; }
    await auth.signInAnonymously(); const snap = await db.ref('admins/' + username).once('value'); const data = snap.val();
    if (!data) { errEl.textContent = '管理員帳戶不存在'; return; }

    const cred = await auth.signInAnonymously(); currentUser.uid = cred.user.uid; currentUser.phone = phone; currentUser.isAdmin = false;

  busListRef = db.ref('van/active_buses'); busListRef.on('value', snap => { const data = snap.val() || {}; let html = '', count = 0; for (const plate in data) { const bus = data[plate]; if (Date.now() - bus.lastUpdate > 60000) continue; count++; html += `<div class="card" style="padding:14px;"><div style="font-size:24px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div><div style="font-size:17px;color:#ccc;">${bus.currentStation||'未知'} · 👥 ${bus.passengerCount||0}人</div><button class="btn btn-portal" style="margin-top:8px;font-size:20px;padding:14px;" data-plate="${plate}">追蹤</button></div>`; } container.innerHTML = count === 0 ? '<div style="text-align:center;color:#888;font-size:18px;">沒有活躍車輛</div>' : html; container.querySelectorAll('[data-plate]').forEach(btn => { btn.addEventListener('click', () => trackBus(btn.dataset.plate)); }); });
}
function trackBus(plate) {
  currentBusId = plate; showView('view-passenger'); const card = document.getElementById('pass-data-card'); card.innerHTML = '讀取中…'; passengerLastStationIndex = -1;
  if (passengerMsgRef) passengerMsgRef.off(); const busRef = db.ref('van/active_buses/' + plate);
  busRef.on('value', snap => { const bus = snap.val(); if (!bus) { card.innerHTML = '車輛已離線'; return; } const currentIdx = bus.stationIndex || 0; const route = bus.mode === 'busy' ? BUSY : NORMAL; const currentStation = route[currentIdx] || '未知'; const nextIdx = currentIdx + 1 < route.length ? currentIdx + 1 : 0; const nextStation = route[nextIdx] || '終點'; card.innerHTML = `<div style="font-size:24px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div><div class="station-name">${currentStation}</div><div style="font-size:18px;color:var(--gold);">下一站：${nextStation}</div><div style="font-size:17px;">方向：${bus.direction===0?'往元朗':'往大棠'} · 👥 ${bus.passengerCount||0}人</div>`; renderPassRouteStrip(bus); if (passengerVoiceEnabled && currentIdx !== passengerLastStationIndex) { passengerLastStationIndex = currentIdx; speakCantonese('到達 ' + currentStation); if (nextStation !== '終點') setTimeout(() => speakCantonese('下一站 ' + nextStation), 2000); else setTimeout(() => speakCantonese('已到達總站'), 2000); } });
  passengerMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(plate); passengerMsgRef.on('value', snap => { const list = document.getElementById('pass-msg-list'); list.innerHTML = ''; snap.forEach(child => { const msg = child.val(); const div = document.createElement('div'); div.className = 'msg-row'; if (msg.audio) { const btn = document.createElement('button'); btn.className = 'play-audio'; btn.textContent = '▶ 語音'; btn.addEventListener('click', () => { const aud = new Audio('data:audio/webm;base64,' + msg.audio); aud.volume = 1.0; aud.play(); }); div.appendChild(btn); div.appendChild(document.createTextNode(msg.senderPhone||'')); } else { div.textContent = (msg.senderPhone||'') + ': ' + (msg.text||'(訊息)'); } list.appendChild(div); }); });
}
function renderPassRouteStrip(bus) { const strip = document.getElementById('pass-route-strip'); strip.innerHTML = ''; const route = bus.mode === 'busy' ? BUSY : NORMAL; const current = bus.stationIndex || 0; route.forEach((name, idx) => { const node = document.createElement('div'); node.className = 'dot-node'; if (idx < current) node.classList.add('passed'); else if (idx === current) node.classList.add('current'); else if (idx === current + 1) node.classList.add('next'); node.innerHTML = `<div class="dot"></div><span>${name.length>6?name.slice(0,6)+'…':name}</span>`; strip.appendChild(node); }); }
document.getElementById('voice-toggle').addEventListener('click', function() { passengerVoiceEnabled = !passengerVoiceEnabled; if (passengerVoiceEnabled) { this.style.background = 'var(--green)'; this.style.color = '#fff'; this.textContent = '🔊 廣東話自動報站 (已開啟)'; showToast('✅ 自動報站已開啟'); if (currentBusId) { db.ref('van/active_buses/' + currentBusId).once('value', snap => { const bus = snap.val(); if (bus) { const route = bus.mode === 'busy' ? BUSY : NORMAL; const idx = bus.stationIndex || 0; const currentStation = route[idx] || '未知'; const nextIdx = idx + 1 < route.length ? idx + 1 : 0; const nextStation = route[nextIdx] || '終點'; passengerLastStationIndex = idx; speakCantonese('到達 ' + currentStation); if (nextStation !== '終點') setTimeout(() => speakCantonese('下一站 ' + nextStation), 2000); else setTimeout(() => speakCantonese('已到達總站'), 2000); } }); } } else { this.style.background = '#ff9f0a'; this.style.color = '#000'; this.textContent = '🔊 開啟廣東話自動報站'; passengerLastStationIndex = -1; showToast('⏸️ 自動報站已關閉'); } });
document.getElementById('btn-pass-send').addEventListener('click', () => { const input = document.getElementById('pass-msg-input'); const text = input.value.trim(); if (!text || !currentBusId) return; db.ref('van/messages').push({ busId:currentBusId, senderUid:currentUser.uid, senderPhone:currentUser.phone, text, timestamp:Date.now(), type:'text' }).then(() => { input.value=''; showToast('已發送'); }); });

function initDriverPanel() {
  if (!driverData.plate) { const plate = prompt('請輸入車牌號碼 (例如：AB1234)'); if (plate) driverData.plate = plate.toUpperCase(); else { showToast('必須輸入車牌'); showView('view-lobby'); return; } }
  if (driverMsgRef) driverMsgRef.off(); const busRef = db.ref('van/active_buses/' + driverData.plate);
  busRef.on('value', snap => { const data = snap.val(); if (data) { driverData.mode = data.mode || 'busy'; driverData.direction = data.direction || 0; driverData.stationIndex = data.stationIndex || 0; driverData.passengerCount = data.passengerCount || 0; driverData.isActive = data.isActive || false; driverData.carSeats = data.carSeats || 16; driverData.isFull = data.isFull || false; updateDriverUI(); } });
  driverMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(driverData.plate); driverMsgRef.on('value', snap => { ['driver-msg-list','driver-msg-list-overlay'].forEach(id => { const el = document.getElementById(id); if (el) { el.innerHTML = ''; snap.forEach(child => { const msg = child.val(); const div = document.createElement('div'); div.className = 'msg-row'; if (msg.audio) { const btn = document.createElement('button'); btn.className = 'play-audio'; btn.textContent = '▶ 語音'; btn.addEventListener('click', () => { const aud = new Audio('data:audio/webm;base64,' + msg.audio); aud.volume = 1.0; aud.play(); }); div.appendChild(btn); } else { div.textContent = msg.text || '(訊息)'; } el.appendChild(div); }); } }); });
  updateDriverUI(); document.getElementById('start-gps').style.display = driverData.isActive ? 'none' : 'block'; document.getElementById('stop-gps').style.display = driverData.isActive ? 'block' : 'none';
}
function updateDriverUI() { const route = getRoute(); const idx = driverData.stationIndex || 0; const station = route[idx] || '未知'; const nextIdx = idx+1 < route.length ? idx+1 : 0; const nextStation = route[nextIdx] || '終點'; document.getElementById('d-info').textContent = `🚐 ${driverData.plate||'未設定'} | 手機: ${currentUser.phone||'未登入'}`; document.getElementById('d-station').textContent = station; document.getElementById('d-target').textContent = '下一站：' + nextStation; document.getElementById('d-pass-count').textContent = driverData.passengerCount; document.getElementById('d-mode-badge').textContent = driverData.mode==='busy' ? '繁忙時段' : '非繁忙時段'; document.getElementById('d-dir-badge').textContent = driverData.direction===0 ? '往元朗' : '往大棠'; const fullBtn = document.getElementById('d-full-btn'); if (driverData.isFull) { fullBtn.style.background='var(--red)'; fullBtn.textContent='✅ 滿座'; } else { fullBtn.style.background='var(--green)'; fullBtn.textContent='🚫 滿座'; } document.getElementById('d-car-btn').textContent = driverData.carSeats + '座'; renderDriverRouteStrip(); }
function renderDriverRouteStrip() { const strip = document.getElementById('d-route-strip'); strip.innerHTML = ''; const route = getRoute(); const idx = driverData.stationIndex || 0; route.forEach((name, i) => { const node = document.createElement('div'); node.className = 'dot-node'; if (i < idx) node.classList.add('passed'); else if (i === idx) node.classList.add('current'); else if (i === idx + 1) node.classList.add('next'); node.innerHTML = `<div class="dot"></div><span>${name.length>6?name.slice(0,6)+'…':name}</span>`; strip.appendChild(node); }); }
function updateDriverDB() { const route = getRoute(); const idx = driverData.stationIndex || 0; const currentStation = route[idx] || '未知'; const nextIdx = idx+1 < route.length ? idx+1 : 0; const nextStation = route[nextIdx] || '終點'; const data = { plate: driverData.plate, mode: driverData.mode, direction: driverData.direction, stationIndex: idx, currentStation, nextStation, passengerCount: driverData.passengerCount, isActive: driverData.isActive, carSeats: driverData.carSeats, isFull: driverData.isFull, lastUpdate: Date.now() }; if (driverData.plate) db.ref('van/active_buses/'+driverData.plate).update(data); updateDriverUI(); }
async function goToNextStation() { const route = getRoute(); if (driverData.stationIndex < route.length - 1) { driverData.stationIndex++; updateDriverDB(); const currentStation = route[driverData.stationIndex]; const nextIdx = driverData.stationIndex + 1; const nextStation = nextIdx < route.length ? route[nextIdx] : null; await speakCantonese('到達 ' + currentStation); if (nextStation) setTimeout(() => speakCantonese('下一站 ' + nextStation), 2000); else setTimeout(() => speakCantonese('已到達總站'), 2000); } else { showToast('已到總站，自動調頭'); driverData.direction = driverData.direction === 0 ? 1 : 0; driverData.stationIndex = 0; updateDriverDB(); speakCantonese('已調頭，返回起點'); } }
async function goToPrevStation() { const route = getRoute(); if (driverData.stationIndex > 0) { driverData.stationIndex--; updateDriverDB(); const currentStation = route[driverData.stationIndex]; const nextIdx = driverData.stationIndex + 1; const nextStation = nextIdx < route.length ? route[nextIdx] : null; await speakCantonese('到達 ' + currentStation); if (nextStation) setTimeout(() => speakCantonese('下一站 ' + nextStation), 2000); else setTimeout(() => speakCantonese('已到達總站'), 2000); } else { showToast('已係起點'); } }
document.getElementById('btn-prev').addEventListener('click', goToPrevStation);
document.getElementById('btn-next').addEventListener('click', goToNextStation);
document.getElementById('btn-add-pass').addEventListener('click', () => { if (!driverData.isActive) { showToast('請先開始當值'); return; } driverData.passengerCount++; updateDriverDB(); });
document.getElementById('btn-sub-pass').addEventListener('click', () => { if (driverData.passengerCount > 0) driverData.passengerCount--; updateDriverDB(); });
document.getElementById('d-full-btn').addEventListener('click', function() { if (!driverData.isActive) { showToast('請先開始當值'); return; } driverData.isFull = !driverData.isFull; updateDriverDB(); if (driverData.isFull) speakCantonese('滿座，唔該晒'); else speakCantonese('已取消滿座'); });
document.getElementById('d-car-btn').addEventListener('click', () => { driverData.carSeats = driverData.carSeats===16 ? 19 : 16; updateDriverDB(); });
document.getElementById('btn-switch-dir').addEventListener('click', () => { if (!driverData.isActive) { showToast('請先開始當值'); return; } driverData.direction = driverData.direction===0 ? 1 : 0; const route = getRoute(); driverData.stationIndex = route.length - 1 - driverData.stationIndex; updateDriverDB(); speakCantonese('已調頭'); });
document.getElementById('btn-mode-toggle').addEventListener('click', () => { driverData.mode = driverData.mode==='busy' ? 'normal' : 'busy'; driverData.stationIndex = 0; updateDriverDB(); showToast('已切換路線'); });

function initWalkieTargetsLive(selectId, excludePlate = null) {
  const select = document.getElementById(selectId); if (!select) return;
  db.ref('van/active_buses').on('value', snap => { const data = snap.val() || {}; let html = '<option value="all">📢 全部司機（群聊）</option>'; for (const plate in data) { if (Date.now() - data[plate].lastUpdate < 60000) { if (excludePlate && plate === excludePlate) continue; html += `<option value="${plate}">🚐 ${plate}</option>`; } } select.innerHTML = html; });
}
function initWalkieTalkie() { if (!driverData.plate) return; initWalkieTargetsLive('walkie-target', driverData.plate); if (walkieRef) walkieRef.off(); walkieRef = db.ref('van/walkie_talkie').orderByChild('timestamp').limitToLast(50); walkieRef.on('value', snap => { const container = document.getElementById('walkie-messages'); let html = ''; snap.forEach(child => { const msg = child.val(); if (msg.target === 'all' || msg.target === driverData.plate || msg.senderPlate === driverData.plate) { const time = new Date(msg.timestamp).toLocaleTimeString('zh-HK'); const sender = msg.senderPlate || '未知司機'; html += `<div style="padding:4px 0;border-bottom:1px solid #333;font-size:14px;"><span style="color:#888;">[${time}]</span> <strong>${sender}</strong>: ${msg.audio ? `<button class="play-audio" style="font-size:12px;padding:2px 8px;" onclick="var a=new Audio('data:audio/webm;base64,${msg.audio}');a.volume=1.0;a.play()">▶ 語音</button>` : msg.text}</div>`; } }); container.innerHTML = html || '<div style="color:#888;font-size:14px;">暫無對講機訊息</div>'; }); }
function initAdminWalkie() { if (!currentUser.isAdmin) return; initWalkieTargetsLive('admin-walkie-target'); if (adminWalkieRef) adminWalkieRef.off(); adminWalkieRef = db.ref('van/walkie_talkie').orderByChild('timestamp').limitToLast(50); adminWalkieRef.on('value', snap => { const container = document.getElementById('admin-walkie-messages'); let html = ''; snap.forEach(child => { const msg = child.val(); const time = new Date(msg.timestamp).toLocaleTimeString('zh-HK'); const sender = msg.senderPlate || '未知司機'; const target = msg.target === 'all' ? '📢群聊' : msg.target; html += `<div style="padding:4px 0;border-bottom:1px solid #333;font-size:14px;"><span style="color:#888;">[${time}]</span> <strong>${sender}</strong> → ${target}: ${msg.audio ? `<button class="play-audio" style="font-size:12px;padding:2px 8px;" onclick="var a=new Audio('data:audio/webm;base64,${msg.audio}');a.volume=1.0;a.play()">▶ 語音</button>` : msg.text}</div>`; }); container.innerHTML = html || '<div style="color:#888;font-size:14px;">暫無對講機訊息</div>'; }); }

// ==================== GPS 一鍵高精度 100米 ====================
document.getElementById('start-gps').addEventListener('click', () => {
  if (!driverData.plate) { showToast('請先設定車牌'); return; } if (!navigator.geolocation) { showToast('瀏覽器不支援 GPS'); return; } if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  showToast('正在啟動高精度 GPS，請允許定位權限'); lastReportedIndex = driverData.stationIndex;
  gpsWatchId = navigator.geolocation.watchPosition(
    (position) => { if (!driverData.isActive || !driverData.plate) return; const coords = getCoords(); const route = getRoute(); if (!coords || coords.length === 0) return; let minDist = Infinity, nearestIdx = 0; for (let i = 0; i < coords.length; i++) { const d = calcDistance(position.coords.latitude, position.coords.longitude, coords[i].lat, coords[i].lng); if (d < minDist) { minDist = d; nearestIdx = i; } } if (minDist < 100 && nearestIdx !== lastReportedIndex) { lastReportedIndex = nearestIdx; driverData.stationIndex = nearestIdx; updateDriverDB(); const stationName = route[nearestIdx]; speakCantonese('到達 ' + stationName); const nextIdx = nearestIdx + 1; if (nextIdx < route.length) setTimeout(() => speakCantonese('下一站 ' + route[nextIdx]), 2000); else setTimeout(() => { speakCantonese('已到達總站'); driverData.direction = driverData.direction === 0 ? 1 : 0; driverData.stationIndex = 0; lastReportedIndex = -1; updateDriverDB(); showToast('已到總站，自動調頭'); }, 2500); } document.getElementById('d-gps-status').textContent = `📍 GPS 定位中 (距離最近站點 ${Math.round(minDist)}m)`; },
    (error) => { console.warn('GPS 錯誤:', error); showToast('GPS 定位失敗，請確認定位服務已開啟並允許瀏覽器使用位置'); },
    { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
  );
  driverData.isActive = true; updateDriverDB(); document.getElementById('start-gps').style.display = 'none'; document.getElementById('stop-gps').style.display = 'block'; speakCantonese('開始當值，高精度 GPS 定位已啟動');
});
document.getElementById('stop-gps').addEventListener('click', () => { driverData.isActive = false; if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; } lastReportedIndex = -1; updateDriverDB(); document.getElementById('start-gps').style.display = 'block'; document.getElementById('stop-gps').style.display = 'none'; document.getElementById('d-gps-status').textContent = '📍 GPS 已停止'; showToast('🔴 已停止當值'); speakCantonese('已停止當值'); });

function loadAdminPanel() {
  db.ref('van/active_buses').on('value', snap => { const data = snap.val() || {}; let count = 0, totalPass = 0; for (const plate in data) { if (Date.now() - data[plate].lastUpdate < 60000) { count++; totalPass += (data[plate].passengerCount || 0); } } document.getElementById('admin-active-count').textContent = count; document.getElementById('admin-passenger-count').textContent = totalPass; });

  document.getElementById('btn-kick-vehicle').onclick = () => { const id = document.getElementById('admin-kick-vehicle').value.trim(); if (!id) { showToast('請輸入車牌或電話'); return; } const clear = document.getElementById('admin-kick-clear-msgs').checked; db.ref('van/active_buses').once('value', snap => { const data = snap.val() || {}; let found = false; for (const plate in data) { if (plate === id || (data[plate].phone && data[plate].phone === id)) { db.ref('van/active_buses/'+plate).remove(); if (clear) { db.ref('van/messages').orderByChild('busId').equalTo(plate).once('value', s => { s.forEach(child => child.ref.remove()); }); } found = true; showToast('已踢走車輛 ' + plate); document.getElementById('admin-kick-status').textContent = '✅ 已踢走 ' + plate; break; } } if (!found) showToast('找不到車輛'); }); document.getElementById('admin-kick-vehicle').value = ''; };
  document.getElementById('btn-kick-passenger').onclick = () => { const name = document.getElementById('admin-kick-passenger').value.trim(); if (!name) { showToast('請輸入名稱或電話'); return; } const clear = document.getElementById('admin-kick-clear-msgs').checked; db.ref('van/messages').orderByChild('senderPhone').equalTo(name).once('value', snap => { let count = 0; snap.forEach(child => { if (clear) child.ref.remove(); count++; }); showToast('已處理 ' + count + ' 條訊息'); document.getElementById('admin-kick-status').textContent = '✅ 已移除乘客 ' + name + ' 嘅 ' + count + ' 條訊息'; }); document.getElementById('admin-kick-passenger').value = ''; };
  document.getElementById('btn-publish-announce').onclick = () => { const text = document.getElementById('admin-announce-text').value.trim(); if (!text) { showToast('請輸入公告內容'); return; } db.ref('van/announcements').push({ text, timestamp: Date.now(), publisher: currentUser.phone || 'admin' }).then(() => { document.getElementById('admin-announce-text').value = ''; showToast('公告已發佈'); checkAnnounce(); }); };
  document.getElementById('btn-clear-announce').onclick = () => { if (!confirm('清除所有公告？')) return; db.ref('van/announcements').remove(); showToast('已清除公告'); };
  document.getElementById('btn-admin-broadcast-send').onclick = () => { const input = document.getElementById('admin-broadcast-input'); const text = input.value.trim(); const target = document.getElementById('admin-broadcast-target').value.trim(); if (!text) { showToast('請輸入訊息'); return; } const msgData = { text, senderUid:'admin', senderPhone:'👑 '+(currentUser.phone||'管理員'), timestamp:Date.now(), type:'text', isAdmin:true }; if (target) { msgData.busId = target; db.ref('van/messages').push(msgData).then(() => { input.value=''; showToast('已發送給 '+target); }); } else { db.ref('van/active_buses').once('value', snap => { const data = snap.val()||{}; let count = 0; for (const plate in data) { if (Date.now()-data[plate].lastUpdate < 60000) { db.ref('van/messages').push({...msgData, busId:plate}); count++; } } input.value=''; showToast('已廣播給 '+count+' 輛車'); document.getElementById('admin-broadcast-status').textContent = '✅ 已廣播給 '+count+' 輛車'; }); } };
  document.getElementById('btn-broadcast-target-all').onclick = () => { document.getElementById('admin-broadcast-target').value = ''; showToast('已設為全部車輛'); };
  document.getElementById('btn-clear-walkie').onclick = () => { if (!currentUser.isAdmin) { showToast('權限不足'); return; } if (!confirm('⚠️ 確定清除所有對講機訊息？')) return; db.ref('van/walkie_talkie').remove().then(() => showToast('✅ 已清除所有對講機訊息')); };
  document.querySelectorAll('.admin-tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active')); this.classList.add('active'); document.getElementById('admin-section-' + this.dataset.tab).classList.add('active'); if (this.dataset.tab === 'devices') loadDeviceList(); if (this.dataset.tab === 'walkie') { initAdminWalkie(); updateAdminWalkieTargets(); } }); });
}
function loadDeviceList() { const container = document.getElementById('admin-device-list'); db.ref('user_devices').on('value', snap => { const data = snap.val() || {}; let html = ''; for (const uid in data) { const user = data[uid]; const latest = user.latest || {}; const deviceName = latest.device ? (latest.device.model || 'Unknown') : 'Unknown'; const osName = latest.os ? (latest.os.name || 'Unknown') : 'Unknown'; const browserName = latest.browser ? (latest.browser.name || 'Unknown') : 'Unknown'; const phone = user.phone || '無電話'; const role = user.role || '未知角色'; const lastLogin = user.lastLogin ? new Date(user.lastLogin).toLocaleString('zh-HK') : '未知'; const historyCount = (user.history || []).length; html += `<div class="admin-item" style="border-left-color:var(--gold);padding:10px;"><div class="title">📱 ${deviceName}</div><div class="info"><strong>UID:</strong> ${uid.substring(0,12)}...<br><strong>電話:</strong> ${phone} | <strong>角色:</strong> ${role}<br><strong>系統:</strong> ${osName} | <strong>瀏覽器:</strong> ${browserName}<br><strong>上次登入:</strong> ${lastLogin} | <strong>設備記錄:</strong> ${historyCount} 部</div><button class="btn btn-secondary" style="width:auto;padding:4px 12px;font-size:13px;margin-top:4px;" onclick="showDeviceHistory('${uid}')">📋 查看歷史</button></div>`; } container.innerHTML = html || '<div style="color:#888;text-align:center;padding:12px;">暫無使用者設備資料</div>'; }); }
window.showDeviceHistory = function(uid) { db.ref('user_devices/' + uid).once('value', snap => { const data = snap.val(); if (!data) { showToast('無資料'); return; } const history = data.history || []; let msg = '🛡️ 設備歷史紀錄\n'; msg += `電話: ${data.phone}\n`; msg += `角色: ${data.role}\n`; msg += `共 ${history.length} 部裝置\n\n`; history.forEach((item, idx) => { const info = item.deviceInfo || {}; const device = info.device || {}; const os = info.os || {}; const browser = info.browser || {}; const time = item.timestamp ? new Date(item.timestamp).toLocaleString('zh-HK') : '未知'; msg += `${idx+1}. ${device.model||'未知'} (${os.name||'未知'})\n   ${browser.name||'未知'} · ${time}\n`; }); alert(msg); }); };
function loadBans() { db.ref('van/banned_drivers').on('value', snap => { const data = snap.val() || {}; let html = ''; for (const phone in data) { html += `<span class="badge badge-red" style="font-size:15px;padding:6px 14px;margin:3px;">${phone} <span onclick="db.ref('van/banned_drivers/'+'${phone}').remove();showToast('已解除')" style="cursor:pointer;">✕</span></span>`; } document.getElementById('admin-banned-phones').innerHTML = html || '無'; }); db.ref('van/banned_passengers').on('value', snap => { const data = snap.val() || {}; let html = ''; for (const name in data) { html += `<span class="badge badge-red" style="font-size:15px;padding:6px 14px;margin:3px;">${name} <span onclick="db.ref('van/banned_passengers/'+'${name}').remove();showToast('已解除')" style="cursor:pointer;">✕</span></span>`; } document.getElementById('admin-banned-passengers').innerHTML = html || '無'; }); }
function loadAdminAnnounce() { db.ref('van/announcements').orderByChild('timestamp').limitToLast(20).on('value', snap => { const container = document.getElementById('admin-announce-list'); let html = ''; snap.forEach(child => { const ann = child.val(); const isAudio = ann.audio ? true : false; html += `<div class="admin-item" style="border-left-color:var(--gold);padding:8px 10px;"><div class="info">${new Date(ann.timestamp).toLocaleString('zh-HK')}</div><div style="font-size:15px;">${isAudio ? '🎤 [語音公告]' : ann.text}</div>${isAudio ? `<button class="play-audio" onclick="var a=new Audio('data:audio/webm;base64,${ann.audio}');a.volume=1.0;a.play()">▶ 播放</button>` : ''}<button class="btn btn-secondary" style="width:auto;padding:4px 10px;font-size:13px;" onclick="db.ref('van/announcements/'+'${child.key}').remove();showToast('已刪除')">🗑️</button></div>`; }); container.innerHTML = html || '<div style="color:#888;padding:8px;font-size:15px;">暫無公告</div>'; }); }
function updateAdminWalkieTargets() { const select = document.getElementById('admin-walkie-target'); if (!select) return; db.ref('van/active_buses').once('value', snap => { const data = snap.val() || {}; let html = '<option value="all">📢 全部司機</option>'; for (const plate in data) { if (Date.now() - data[plate].lastUpdate < 60000) { html += `<option value="${plate}">🚐 ${plate}</option>`; } } select.innerHTML = html; }); }
document.getElementById('admin-walkie-refresh')?.addEventListener('click', updateAdminWalkieTargets);

document.getElementById('btn-clear-all-msgs').addEventListener('click', function() {
  if (!confirm('⚠️ 確定清除所有訊息？')) return;
  db.ref('van/messages').remove();
  showToast('已清除全部訊息');
});

// ==================== 公告系統 ====================
function checkAnnounce() {
  db.ref('van/announcements').limitToLast(1).on('value', snap => {
    const hasAnnounce = snap.val() ? true : false;
    const floatBtn = document.getElementById('floating-announce-btn');
    const bellBtn = document.getElementById('announce-bell');
    if (hasAnnounce) {
      floatBtn.classList.add('has-new'); bellBtn.classList.add('has-announce');
      let latest = null; snap.forEach(child => { latest = child.val(); });
      if (latest) document.getElementById('announce-modal-text').textContent = latest.text || '🎤 語音公告（請播放）';
    } else { floatBtn.classList.remove('has-new'); bellBtn.classList.remove('has-announce'); }
  });
}
function loadAnnounceList() { const container = document.getElementById('announce-list-content'); db.ref('van/announcements').orderByChild('timestamp').limitToLast(20).once('value', snap => { let html = ''; snap.forEach(child => { const ann = child.val(); const isAudio = ann.audio ? true : false; html += `<div class="announce-item"><div class="time">${new Date(ann.timestamp).toLocaleString('zh-HK')}</div><div class="text">${isAudio ? '🎤 [語音公告]' : ann.text}</div>${isAudio ? `<button class="play-audio" onclick="var a=new Audio('data:audio/webm;base64,${ann.audio}');a.volume=1.0;a.play()">▶ 播放</button>` : ''}</div>`; }); container.innerHTML = html || '<div style="text-align:center;color:#888;padding:20px;font-size:18px;">暫無公告</div>'; }); }
document.getElementById('floating-announce-btn').addEventListener('click', () => { document.getElementById('announce-overlay').classList.add('show'); loadAnnounceList(); });
document.getElementById('announce-bell').addEventListener('click', () => { document.getElementById('announce-modal').classList.add('active'); });
document.getElementById('announce-modal-close').addEventListener('click', () => { document.getElementById('announce-modal').classList.remove('active'); });
document.getElementById('close-announce-overlay').addEventListener('click', () => { document.getElementById('announce-overlay').classList.remove('show'); });
checkAnnounce();

// ==================== 初始化 ====================
setTimeout(() => { if (!currentUser.uid) openLoginModal(); }, 500);
console.log('西鐵小巴 v9.0 終極完整版 (開發者 - 大輝)');
</script>
