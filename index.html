<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>西鐵小巴 v10.0 精簡版</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.37/dist/ua-parser.min.js"></script>
<style>
:root{--bg:#0f0f0f;--card:#1c1c1e;--gold:#ffcc00;--blue:#0a84ff;--red:#ff453a;--green:#30d158;--purple:#bf5af2;--orange:#ff9500;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:var(--bg);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:10px;text-align:center;border-bottom:1px solid #333;flex-shrink:0;position:relative}
.title{font-size:32px;font-weight:800;color:var(--gold)}
.dev-tag{font-size:16px;color:#aaa;cursor:pointer}
.global-voice-toggle{position:absolute;top:8px;right:10px;width:52px;height:52px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:26px;cursor:pointer}
.global-voice-toggle.muted{background:var(--red)}
.view{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column}
.view.active{display:flex}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid #333}
.btn{width:100%;padding:18px;border-radius:16px;font-size:24px;font-weight:700;border:none;cursor:pointer;color:#fff;margin-bottom:10px;transition:0.15s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-portal{background:linear-gradient(135deg,#0a84ff,#0066cc)}
.btn-driver{background:linear-gradient(135deg,#ff453a,#c62828)}
.btn-secondary{background:#3a3a3c}
.btn-warn{background:#ff9f0a;color:#000}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-purple{background:var(--purple)}
.row{display:flex;gap:12px;margin-bottom:10px}
.row>*{flex:1}
.badge{display:inline-block;padding:8px 20px;border-radius:20px;font-weight:700;font-size:18px;margin:4px}
.badge-red{background:var(--red)}
.badge-blue{background:var(--blue)}
.badge-purple{background:var(--purple)}
.big-number{font-size:56px;font-weight:800;text-align:center;margin:4px 0;color:var(--gold)}
.station-name{font-size:32px;font-weight:700;text-align:center;margin:4px 0;color:var(--gold)}
.msg-area{background:#1a1a1a;border-radius:14px;padding:12px;margin-top:8px}
.msg-list{max-height:200px;overflow-y:auto;margin-bottom:8px;font-size:16px}
.msg-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #333;flex-wrap:wrap}
.msg-input{flex:1;padding:14px;border-radius:12px;border:none;font-size:18px;background:#2c2c2e;color:#fff;min-width:100px}
.record-btn,.send-btn{width:56px;height:56px;border-radius:14px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
.record-btn{background:#ff9f0a;color:#000;font-size:26px}
.record-btn.recording{background:#ff0000;color:#fff;animation:pulse .6s infinite}
.send-btn{background:var(--blue);color:#fff;font-size:18px;font-weight:700}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 28px;border-radius:30px;font-size:18px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.login-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-modal.active{display:flex}
.login-card{background:#1c1c1e;border:2px solid var(--gold);border-radius:20px;padding:24px;max-width:400px;width:100%;text-align:center}
.login-card input{width:100%;padding:16px;margin:8px 0;border-radius:12px;border:none;font-size:20px;background:#2c2c2e;color:#fff}
.route-strip{display:flex;overflow-x:auto;gap:14px;padding:10px 0;border-top:1px solid #333;margin-top:8px}
.dot-node{flex:0 0 90px;text-align:center;font-size:14px;transition:all .3s}
.dot{width:28px;height:28px;border-radius:50%;background:#444;margin:0 auto 4px;border:2px solid #555;transition:all .3s}
.dot-node.current .dot{background:var(--green);box-shadow:0 0 16px var(--green);border-color:#fff}
.dot-node.current span{color:#fff;font-weight:700}
.dot-node.next .dot{background:var(--green);animation:blink .8s infinite;border-color:#fff}
.dot-node.next span{color:var(--green);font-weight:600}
.dot-node.passed .dot{background:#666;border-color:#888}
.dot-node.passed span{color:#888}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.play-audio{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:15px}
.admin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.admin-tab{flex:1;min-width:70px;padding:12px 8px;background:#2c2c2e;border:none;color:#888;border-radius:12px;cursor:pointer;font-size:16px;font-weight:700;transition:.3s}
.admin-tab.active{background:var(--gold);color:#000}
.admin-section{display:none}
.admin-section.active{display:block}
.admin-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.admin-stat-card{background:#2c2c2e;border-radius:12px;padding:12px;text-align:center}
.admin-stat-card .label{font-size:14px;color:#888}
.admin-stat-card .value{font-size:28px;font-weight:800;color:var(--gold)}
.admin-item{background:#2c2c2e;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--blue)}
.admin-item .title{font-size:18px;font-weight:700;color:var(--gold)}
.admin-item .info{font-size:15px;color:#ccc;margin-top:2px}
.admin-input{flex:1;padding:14px;border-radius:10px;border:none;font-size:18px;background:#2c2c2e;color:#fff;min-width:60px}
.floating-announce{position:fixed;bottom:80px;right:16px;width:60px;height:60px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:28px;cursor:pointer;z-index:15;box-shadow:0 4px 14px rgba(0,0,0,0.4);transition:all .3s}
.floating-announce.has-new{background:var(--orange);animation:pulse-orange 1s infinite}
@keyframes pulse-orange{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.announce-bell{position:fixed;top:10px;right:68px;z-index:30;background:#333;color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:22px;display:none;align-items:center;justify-content:center;cursor:pointer}
.announce-bell.has-announce{display:flex;background:#ffcc00;color:#000}
.announce-bell .dot-badge{position:absolute;top:-2px;right:-2px;background:#ff0000;border-radius:50%;width:12px;height:12px}
.announce-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:30;display:none;flex-direction:column;padding:16px}
.announce-overlay.show{display:flex}
.announce-list{flex:1;overflow-y:auto;background:#1a1a1a;border-radius:14px;padding:12px;margin-top:12px}
.announce-item{background:#2c2c2e;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--gold)}
.announce-item .time{font-size:12px;color:#888}
.announce-item .text{font-size:16px}
.announce-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:40;display:none;align-items:center;justify-content:center;padding:20px}
.announce-modal.active{display:flex}
.announce-modal .modal-card{background:#2c1a3a;border:2px solid var(--gold);border-radius:20px;padding:24px;max-width:400px;width:100%;text-align:center}
.announce-modal .modal-text{font-size:22px;color:#fff;margin-bottom:12px}
.announce-modal .close-btn{background:var(--gold);color:#000;border:none;padding:12px 24px;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer}
.msg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:20;display:none;flex-direction:column;padding:16px}
.msg-overlay.show{display:flex}
.overlay-btn{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;border:none;border-radius:28px;padding:16px 24px;font-weight:800;font-size:22px;box-shadow:0 4px 14px rgba(255,204,0,0.3);z-index:10}
.donate-card{background:#2c1a3a;border:2px solid var(--gold);border-radius:16px;padding:16px;text-align:center;margin-top:8px}
.donate-card .fps-code{background:#000;padding:12px;border-radius:12px;display:inline-block;font-size:20px;color:var(--gold);cursor:pointer}
#voice-toggle{font-size:28px!important;padding:20px!important;min-height:80px}
</style>
</head>
<body>
<div class="header">
  <div class="title">西鐵小巴 v10.0</div>
  <div class="dev-tag" id="dev-tag">⚡ 精簡版</div>
  <button class="global-voice-toggle" id="global-voice-btn">🔊</button>
</div>

<!-- 公告 -->
<button class="floating-announce" id="floating-announce-btn">📢</button>
<button class="announce-bell" id="announce-bell">🔔<span class="dot-badge"></span></button>
<div class="announce-overlay" id="announce-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:24px;font-weight:bold;">📢 系統公告</span>
    <button class="btn btn-secondary" id="close-announce-overlay" style="width:auto;padding:10px 20px;font-size:18px;">✕ 關閉</button>
  </div>
  <div class="announce-list" id="announce-list-content"><div style="text-align:center;color:#888;padding:20px;font-size:18px;">暫無公告</div></div>
</div>
<div class="announce-modal" id="announce-modal">
  <div class="modal-card"><div class="modal-text" id="announce-modal-text"></div><button class="close-btn" id="announce-modal-close">關閉</button></div>
</div>

<!-- 登入 -->
<div class="login-modal" id="login-modal">
  <div class="login-card">
    <h2 style="color:var(--gold);margin-bottom:16px;font-size:28px;">🔐 登入</h2>
    <div id="login-choice">
      <button class="btn btn-portal" id="login-as-admin" style="font-size:24px;">👑 管理員</button>
      <button class="btn btn-green" id="login-as-user" style="font-size:24px;">🧍 乘客/司機</button>
    </div>
    <div id="admin-login-form" style="display:none;">
      <input type="text" id="admin-username" placeholder="管理員名稱" style="font-size:20px;">
      <input type="password" id="admin-password" placeholder="密碼" style="font-size:20px;">
      <button class="btn btn-warn" id="admin-login-btn" style="font-size:22px;">確認</button>
      <button class="btn btn-secondary" id="admin-login-back" style="font-size:20px;">返回</button>
      <div id="admin-login-error" style="color:var(--red);margin-top:8px;font-size:16px;"></div>
    </div>
    <div id="user-login-form" style="display:none;">
      <input type="tel" id="user-phone" placeholder="電話號碼 (8位數字)" style="font-size:20px;">
      <button class="btn btn-green" id="user-login-btn" style="font-size:22px;">確認</button>
      <button class="btn btn-secondary" id="user-login-back" style="font-size:20px;">返回</button>
      <div id="user-login-error" style="color:var(--red);margin-top:8px;font-size:16px;"></div>
    </div>
    <button class="btn btn-secondary" id="login-cancel" style="font-size:20px;">取消</button>
  </div>
</div>

<!-- 大堂 -->
<div id="view-lobby" class="view active">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:22px;font-weight:bold;color:var(--gold);">📋 使用說明</span>
      <button class="btn" style="width:auto;padding:10px 20px;background:var(--gold);color:#000;font-size:18px;" id="btn-guide-voice">🔊 聆聽教學</button>
    </div>
    <div style="margin-top:10px;color:#ccc;line-height:1.8;font-size:17px;">
      🚏 司機：登入→輸入車牌→開始當值→真實GPS自動報站<br>
      🧍 乘客：登入→揀車追蹤→開啟報站→自動同步語音<br>
      👑 管理員：登入→全面後台管理<br>
      📻 對講機功能已移除，以精簡系統
    </div>
  </div>
  <button class="btn btn-portal" id="btn-passenger" style="font-size:26px;padding:20px;">🧍 乘客入口</button>
  <button class="btn btn-driver" id="btn-driver" style="font-size:26px;padding:20px;">🚏 司機入口</button>
  <button class="btn btn-warn" id="btn-generate-qr" style="font-size:24px;padding:18px;">📱 分享二維碼</button>
  <button class="btn btn-purple" id="btn-admin-panel" style="display:none;font-size:24px;padding:18px;">👑 總管後台</button>
  <button class="btn btn-secondary" id="btn-logout" style="font-size:22px;padding:18px;">🚪 登出</button>
  <div class="donate-card">
    <div style="color:var(--gold);font-size:20px;font-weight:bold;margin-bottom:8px;">☕ 支持開發者</div>
    <div class="fps-code" id="fps-code">轉數快：122891914</div>
    <div style="color:#aaa;font-size:14px;margin-top:6px;">點擊複製轉數快號碼</div>
  </div>
  <div id="qr-box" class="card" style="display:none;"></div>
</div>

<!-- 乘客列表 -->
<div id="view-passenger-list" class="view">
  <h2 style="text-align:center;font-size:24px;">🚐 線上小巴</h2>
  <div id="bus-list-container" style="margin:8px 0;font-size:18px;">載入中…</div>
  <button class="btn btn-secondary" id="btn-back-list" style="font-size:22px;padding:18px;">返回大堂</button>
</div>

<!-- 乘客追蹤 -->
<div id="view-passenger" class="view">
  <button id="voice-toggle" class="btn" style="background:#ff9f0a;color:#000;font-size:28px;padding:20px;min-height:80px;">🔊 開啟廣東話自動報站</button>
  <div class="card" id="pass-data-card" style="font-size:18px;">讀取中…</div>
  <div class="route-strip" id="pass-route-strip"></div>
  <div class="msg-area">
    <div class="msg-list" id="pass-msg-list"></div>
    <div class="msg-row">
      <button class="record-btn" id="btn-pass-record">🎤<span class="record-timer" id="pass-timer" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:12px;display:none;">0s</span></button>
      <input id="pass-msg-input" class="msg-input" placeholder="訊息…" style="font-size:18px;">
      <button class="send-btn" id="btn-pass-send" style="font-size:18px;">發</button>
    </div>
    <button class="btn btn-secondary" style="font-size:18px;padding:12px;" id="btn-pass-clear">清除訊息</button>
  </div>
  <button class="btn btn-secondary" id="btn-back-track" style="font-size:22px;padding:18px;">返回列表</button>
</div>

<!-- 司機頁面 -->
<div id="view-driver" class="view">
  <div id="driver-panel" style="display:flex;flex-direction:column;gap:10px;">
    <div class="card" style="text-align:center;padding:14px;">
      <div style="font-size:18px;color:#aaa;" id="d-info">🚐 未登入 | 車牌: -</div>
      <div style="margin:8px 0;">
        <span class="badge badge-purple" id="d-mode-badge">繁忙時段</span>
        <span class="badge badge-red" id="d-dir-badge">往元朗</span>
      </div>
      <div class="station-name" id="d-station">大棠黃泥墩</div>
      <div class="target-station" id="d-target" style="font-size:20px;color:var(--gold);">下一站：大棠山路</div>
      <div id="d-gps-status" style="font-size:16px;color:#888;margin-top:4px;">📍 GPS 定位中...</div>
    </div>
    <div class="card" style="text-align:center;padding:12px;">
      <div style="font-size:20px;color:#aaa;">目前乘客</div>
      <div class="big-number" id="d-pass-count">0</div>
      <div class="row">
        <button class="btn btn-green" id="btn-add-pass" style="font-size:28px;padding:16px;">＋ 乘客</button>
        <button class="btn btn-red" id="btn-sub-pass" style="font-size:28px;padding:16px;">－ 乘客</button>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-portal" id="btn-prev" style="font-size:24px;padding:16px;">◀ 上一站</button>
      <button class="btn btn-portal" id="btn-next" style="font-size:24px;padding:16px;">下一站 ▶</button>
    </div>
    <div class="row">
      <button class="btn" id="d-full-btn" style="font-size:22px;padding:16px;background:var(--green);">🚫 滿座</button>
      <button class="btn btn-secondary" id="d-car-btn" style="font-size:22px;padding:16px;">16座</button>
    </div>
    <div class="row">
      <button class="btn btn-secondary" id="btn-switch-dir" style="font-size:20px;padding:16px;">🔄 調頭</button>
      <button class="btn" id="btn-mode-toggle" style="background:#bf5af2;font-size:20px;padding:16px;">切換路線</button>
    </div>
    <button class="btn btn-green" id="start-gps" style="font-size:24px;padding:18px;">🟢 開始當值 (GPS)</button>
    <button class="btn btn-red" id="stop-gps" style="font-size:24px;padding:18px;display:none;">🔴 停止當值</button>
    <div class="route-strip" id="d-route-strip"></div>
    <!-- 對講機區塊已完全移除 -->
    <div class="msg-area">
      <div class="msg-list" id="driver-msg-list"></div>
      <div class="msg-row">
        <button class="record-btn" id="btn-driver-record">🎤<span class="record-timer" id="driver-timer" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:12px;display:none;">0s</span></button>
        <input id="driver-msg-input" class="msg-input" placeholder="廣播訊息…" style="font-size:18px;">
        <button class="send-btn" id="btn-driver-send" style="font-size:18px;">發</button>
      </div>
      <button class="btn btn-secondary" style="font-size:18px;padding:12px;" id="btn-driver-clear">清除訊息</button>
    </div>
    <button class="btn btn-secondary" id="btn-driver-back" style="font-size:22px;padding:18px;">返回大堂</button>
  </div>
  <button class="overlay-btn" id="float-msg-btn" style="font-size:22px;">💬 訊息</button>
</div>

<!-- 訊息浮層 -->
<div class="msg-overlay" id="msg-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:24px;font-weight:bold;">📨 乘客訊息</span>
    <button class="btn btn-secondary" style="width:auto;padding:10px 20px;font-size:18px;" id="close-msg-overlay">✕</button>
  </div>
  <div class="msg-list" id="driver-msg-list-overlay" style="flex:1;background:#1a1a1a;border-radius:14px;padding:10px;"></div>
  <div class="msg-row" style="margin-top:8px;">
    <button class="record-btn" id="btn-driver-record-overlay">🎤<span class="record-timer" id="driver-timer-overlay" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:12px;display:none;">0s</span></button>
    <input id="driver-msg-input-overlay" class="msg-input" placeholder="廣播訊息…" style="font-size:18px;">
    <button class="send-btn" id="btn-driver-send-overlay" style="font-size:18px;">發</button>
  </div>
  <button class="btn btn-secondary" style="font-size:18px;padding:12px;" id="btn-driver-clear-overlay">清除訊息</button>
</div>

<!-- 管理後台 -->
<div id="view-admin" class="view">
  <div class="card" style="border:2px solid var(--gold);background:#1a0a2e;">
    <h2 style="color:var(--gold);text-align:center;font-size:26px;">🛡️ 總管後台</h2>
    <div class="admin-stat-grid">
      <div class="admin-stat-card"><div class="label">🚐 在線</div><div class="value" id="admin-active-count">0</div></div>
      <div class="admin-stat-card"><div class="label">👥 乘客</div><div class="value" id="admin-passenger-count">0</div></div>
      <div class="admin-stat-card"><div class="label">💬 訊息</div><div class="value" id="admin-msg-count">0</div></div>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="monitor">📡 監控</button>
      <button class="admin-tab" data-tab="devices">🛡️ 設備</button>

function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function collectDeviceInfo() {
  try {
    const parser = new UAParser();
    const r = parser.getResult();
    return { device: r.device||{model:'Unknown'}, os: r.os||{name:'Unknown'}, browser: r.browser||{name:'Unknown'}, screen:{width:window.screen.width,height:window.screen.height}, language:navigator.language||'Unknown', timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||'Unknown', userAgent:navigator.userAgent||'Unknown', timestamp:Date.now() };
  } catch(e) { return { device:{model:'Error'}, os:{name:'Error'}, browser:{name:'Error'}, screen:{width:0,height:0}, language:'Error', timezone:'Error', userAgent:'Error', timestamp:Date.now() }; }
}
async function saveDeviceInfo(uid, phone, role) {
  if (!uid) return;
  const info = collectDeviceInfo();
  const ref = db.ref('user_devices/'+uid);
  try {
    const snap = await ref.once('value');
    const existing = snap.val() || {};
    let history = existing.history || [];
    const fingerprint = JSON.stringify(info);
    if (!history.some(item => JSON.stringify(item.deviceInfo)===fingerprint)) {
      history.push({ deviceInfo: info, phone, role, timestamp: Date.now() });
      if (history.length>10) history = history.slice(-10);
    }
    await ref.set({ latest: info, phone, role, lastLogin: Date.now(), history });
  } catch(e) { console.warn('設備指紋儲存失敗', e); }
}

// ===== 語音系統（保留，加強佇列） =====
let preferredVoice = null;
let voiceEnabled = true;
let speechQueue = [];
let isSpeaking = false;

document.getElementById('global-voice-btn').addEventListener('click', function() {
  voiceEnabled = !voiceEnabled;
  this.textContent = voiceEnabled ? '🔊' : '🔇';
  this.classList.toggle('muted');
  if (!voiceEnabled) {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
    speechQueue = [];
    isSpeaking = false;
    showToast('🔇 語音已強制停止');
  } else {
    showToast('🔊 語音已開啟');
  }
});
function getCantoneseVoice() {
  if (preferredVoice) {
    const all = window.speechSynthesis.getVoices();
    if (all.some(v=>v.voiceURI===preferredVoice.voiceURI)) return preferredVoice;
    preferredVoice = null;
  }
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || !voices.length) return null;
  const order = [
    v=>v.lang==='zh-HK' && v.name.includes('Google'),
    v=>v.lang==='zh-HK' && v.name.includes('Microsoft'),
    v=>v.lang==='zh-HK' && (v.name.includes('自然')||v.name.includes('Ting-Ting')),
    v=>v.lang==='zh-HK',
    v=>v.lang.startsWith('zh')
  ];
  for (let cond of order) {
    const found = voices.find(cond);
    if (found) { preferredVoice = found; return found; }
  }
  return null;
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = ()=>getCantoneseVoice();
  if (window.speechSynthesis.getVoices().length) getCantoneseVoice();
}
function speakCantonese(text) {
  if (!voiceEnabled || !window.speechSynthesis) return Promise.resolve();
  return new Promise((resolve) => {
    speechQueue.push({ text, resolve });
    processSpeechQueue();
  });
}
function processSpeechQueue() {
  if (isSpeaking || speechQueue.length === 0) return;
  isSpeaking = true;
  const item = speechQueue.shift();
  const utter = new SpeechSynthesisUtterance(item.text);
  utter.lang = 'zh-HK';
  const voice = getCantoneseVoice();
  if (voice) { utter.voice = voice; utter.rate = 0.9; utter.pitch = 1.0; }
  else { utter.rate = 0.9; utter.pitch = 1.0; }
  utter.onend = () => {
    isSpeaking = false;
    item.resolve();
    processSpeechQueue();
  };
  utter.onerror = () => {
    isSpeaking = false;
    item.resolve();
    processSpeechQueue();
  };
  window.speechSynthesis.speak(utter);
}

function trackBus(plate) {
  currentBusId = plate;
  switchView('view-passenger');
  const card = document.getElementById('pass-data-card');
  card.innerHTML = '讀取中…';
  passengerLastStationIndex = -1;

  const busRef = db.ref('van/active_buses/'+plate);
  activeListeners.passengerBus = busRef;
  busRef.on('value', snap => {
    const bus = snap.val();
    if(!bus){ card.innerHTML='車輛已離線'; return; }
    const idx = bus.stationIndex||0;
    const route = bus.mode==='busy'?BUSY:NORMAL;
    const current = route[idx]||'未知';
    const nextIdx = idx+1<route.length ? idx+1 : 0;
    const next = route[nextIdx]||'終點';
    card.innerHTML = `<div style="font-size:24px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div>
      <div class="station-name">${current}</div>
      <div style="font-size:18px;color:var(--gold);">下一站：${next}</div>
      <div style="font-size:17px;">方向：${bus.direction===0?'往元朗':'往大棠'} · 👥 ${bus.passengerCount||0}人</div>`;
    renderPassStrip(bus);
    if(passengerVoiceEnabled && idx!==passengerLastStationIndex) {

let mediaRecorder=null, audioChunks=[], recordingTimer=null, recSeconds=0;
function startRecord(btn, timer, cb) {
  if(!navigator.mediaDevices) { showToast('不支援錄音'); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable = e=>audioChunks.push(e.data);
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(audioChunks, {type:'audio/webm'});
      const reader = new FileReader();
      reader.onload = ()=>{
        const base64 = reader.result.split(',')[1];
        if(cb) cb(base64);
        showToast('錄音完成');
      };
      reader.readAsDataURL(blob);
      btn.classList.remove('recording');
      if(timer){ timer.style.display='none'; timer.textContent='0s'; }
      clearInterval(recordingTimer);
      recordingTimer=null;
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    recSeconds=0;
    if(timer){ timer.style.display='block'; timer.textContent='0s'; }
    recordingTimer = setInterval(()=>{
      recSeconds++;
      if(timer) timer.textContent = recSeconds+'s';
    },1000);
  }).catch(()=>{
    showToast('無法開啟咪高峰');
    btn.classList.remove('recording');
    if(timer){ timer.style.display='none'; timer.textContent='0s'; }
  });
}
function stopRecord(btn, timer) {
  if(mediaRecorder && mediaRecorder.state==='recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  }
}
function bindRecord(btnId, timerId, cb) {
  const btn = document.getElementById(btnId);
  if(!btn) return;
  const timer = document.getElementById(timerId);
  let hold = null;
  btn.addEventListener('pointerdown', e=>{
    e.preventDefault();
    hold = setTimeout(()=>startRecord(btn, timer, cb), 500);
  });
  btn.addEventListener('pointerup', e=>{
    e.preventDefault();
    clearTimeout(hold);
    if(mediaRecorder && mediaRecorder.state==='recording') stopRecord(btn, timer);
  });
  btn.addEventListener('pointerleave', ()=>{
    clearTimeout(hold);
    if(mediaRecorder && mediaRecorder.state==='recording') stopRecord(btn, timer);
  });
}

async function goNext() {
  if(!driverData.isActive){ showToast('請先開始當值'); return; }
  const route = getRoute();
  if(driverData.stationIndex < route.length-1) {
    driverData.stationIndex++;
    updateDriverDB();
    const cur = route[driverData.stationIndex];
    const next = driverData.stationIndex+1<route.length ? route[driverData.stationIndex+1] : null;
    await speakCantonese('到達 '+cur);
    if(next) setTimeout(()=>speakCantonese('下一站 '+next),2000);
    else setTimeout(()=>speakCantonese('已到達總站'),2000);
  } else {
    showToast('已到總站，自動調頭');
    driverData.direction = driverData.direction===0?1:0;
    driverData.stationIndex=0;
    lastReportedIndex=-1;
    updateDriverDB();
    speakCantonese('已調頭，返回起點');

async function goPrev() {
  if(!driverData.isActive){ showToast('請先開始當值'); return; }
  const route = getRoute();
  if(driverData.stationIndex>0) {
    driverData.stationIndex--;
    updateDriverDB();
    const cur = route[driverData.stationIndex];
    const next = driverData.stationIndex+1<route.length ? route[driverData.stationIndex+1] : null;
    await speakCantonese('到達 '+cur);
    if(next) setTimeout(()=>speakCantonese('下一站 '+next),2000);
    else setTimeout(()=>speakCantonese('已到達總站'),2000);
  } else showToast('已係起點');
}

document.getElementById('start-gps').addEventListener('click', ()=>{
  if(!driverData.plate){ showToast('請先設定車牌'); return; }
  if(!navigator.geolocation){ showToast('不支援 GPS'); return; }
  if(gpsWatchId){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; }
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      if(!driverData.isActive || !driverData.plate) return;
      const coords = getCoords();
      const route = getRoute();
      if(!coords || !coords.length) return;
      let min=Infinity, nearest=0;
      for(let i=0;i<coords.length;i++) {
        const d = calcDistance(pos.coords.latitude, pos.coords.longitude, coords[i].lat, coords[i].lng);
        if(d<min){ min=d; nearest=i; }
      }
      if(min<50 && nearest!==lastReportedIndex) {
        lastReportedIndex = nearest;
        driverData.stationIndex = nearest;
        updateDriverDB();
        const stationName = route[nearest];
        speakCantonese('到達 '+stationName);
        if(nearest+1 < route.length) {
          setTimeout(()=>speakCantonese('下一站 '+route[nearest+1]),2000);
        } else {
          setTimeout(()=>{
            speakCantonese('已到達總站');
            driverData.direction = driverData.direction===0?1:0;
            driverData.stationIndex=0;
            lastReportedIndex=-1;
            updateDriverDB();
            showToast('已到總站，自動調頭');
          },2500);
        }
      }
      document.getElementById('d-gps-status').textContent = `📍 GPS 定位中 (距離最近站點 ${Math.round(min)}m)`;
    },
    err=>{ console.warn('GPS error', err); showToast('GPS 定位中，請確保已開啟 GPS'); },
    { enableHighAccuracy:true, timeout:15000, maximumAge:5000 }
  );
  driverData.isActive = true;
  lastReportedIndex = -1;
  updateDriverDB();
  document.getElementById('start-gps').style.display='none';
  document.getElementById('stop-gps').style.display='block';
  showToast('🟢 已開始當值，GPS 追蹤中');
  speakCantonese('開始當值，GPS 定位完成');
});
document.getElementById('stop-gps').addEventListener('click', ()=>{
  driverData.isActive=false;
  if(gpsWatchId){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; }
  lastReportedIndex=-1;
  updateDriverDB();
  document.getElementById('start-gps').style.display='block';
  document.getElementById('stop-gps').style.display='none';
  document.getElementById('d-gps-status').textContent='📍 GPS 已停止';
  showToast('🔴 已停止當值');
  speakCantonese('已停止當值');
});

          if(p===id || (data[p].phone && data[p].phone===id)){
            db.ref('van/active_buses/'+p).remove();
            if(clear) db.ref('van/messages').orderByChild('busId').equalTo(p).once('value', s=>s.forEach(c=>c.ref.remove()));
            found=true;
            showToast('已踢走車輛 '+p);
            document.getElementById('admin-kick-status').textContent='✅ 已踢走 '+p;
            break;
          }
        }
        if(!found) showToast('找不到車輛');
      });
      document.getElementById('admin-kick-vehicle').value='';
    });
    document.getElementById('btn-kick-passenger').addEventListener('click', function(){
      const name=document.getElementById('admin-kick-passenger').value.trim();
      if(!name){ showToast('請輸入名稱或電話'); return; }
      const clear=document.getElementById('admin-kick-clear-msgs').checked;
      db.ref('van/messages').orderByChild('senderPhone').equalTo(name).once('value', snap=>{
        let count=0;
        snap.forEach(c=>{ if(clear)c.ref.remove(); count++; });
        showToast('已處理 '+count+' 條訊息');
        document.getElementById('admin-kick-status').textContent='✅ 已移除 '+name+' 嘅 '+count+' 條訊息';
      });
      document.getElementById('admin-kick-passenger').value='';
    });
    document.getElementById('btn-publish-announce').addEventListener('click', function(){
      const text=document.getElementById('admin-announce-text').value.trim();
      if(!text){ showToast('請輸入公告'); return; }
      db.ref('van/announcements').push({ text, timestamp:Date.now(), publisher:currentUser.phone||'admin' })
        .then(()=>{ document.getElementById('admin-announce-text').value=''; showToast('公告已發佈'); checkAnnounce(); });
    });
    document.getElementById('btn-clear-announce').addEventListener('click', function(){
      if(!confirm('清除所有公告？'))return;
      db.ref('van/announcements').remove();
      showToast('已清除公告');
    });
    document.getElementById('btn-admin-broadcast-send').addEventListener('click', function(){
      const input=document.getElementById('admin-broadcast-input');
      const text=input.value.trim();
      const target=document.getElementById('admin-broadcast-target').value.trim();
      if(!text){ showToast('請輸入訊息'); return; }
      const msgData={ text, senderUid:'admin', senderPhone:'👑 '+(currentUser.phone||'管理員'), timestamp:Date.now(), type:'text', isAdmin:true };
      if(target) {
        msgData.busId=target;
        db.ref('van/messages').push(msgData).then(()=>{ input.value=''; showToast('已發送給 '+target); });
      } else {
        db.ref('van/active_buses').once('value', snap=>{
          const data=snap.val()||{}; let count=0;
          for(let p in data){ if(Date.now()-data[p].lastUpdate<60000){ const copy={...msgData,busId:p}; db.ref('van/messages').push(copy); count++; } }
          input.value='';
          showToast('已廣播給 '+count+' 輛車');
          document.getElementById('admin-broadcast-status').textContent='✅ 已廣播給 '+count+' 輛車';
        });
      }
    });
    document.getElementById('btn-broadcast-target-all').addEventListener('click', function(){
      document.getElementById('admin-broadcast-target').value='';
      showToast('已設為全部車輛');
    });
    bindRecord('btn-admin-announce-record','admin-announce-timer', (base64)=>{
      db.ref('van/announcements').push({ audio:base64, timestamp:Date.now(), publisher:currentUser.phone||'admin' })
        .then(()=>{ showToast('語音公告已發佈'); checkAnnounce(); });
    });
    bindRecord('btn-admin-broadcast-record','admin-broadcast-timer', (base64)=>{
      const target=document.getElementById('admin-broadcast-target').value.trim();
      const msgData={ audio:base64, senderUid:'admin', senderPhone:'👑 '+(currentUser.phone||'管理員'), timestamp:Date.now(), type:'audio', isAdmin:true };
      if(target) {
        msgData.busId=target;
        db.ref('van/messages').push(msgData).then(()=>showToast('語音已發送給 '+target));
      } else {
        db.ref('van/active_buses').once('value', snap=>{
          const data=snap.val()||{}; let count=0;
          for(let p in data){ if(Date.now()-data[p].lastUpdate<60000){ const copy={...msgData,busId:p}; db.ref('van/messages').push(copy); count++; } }
          showToast('語音已廣播給 '+count+' 輛車');
        });
      }
    });
  }
  // Tab 切換
  if(!window._adminTabs) {
    window._adminTabs=true;
    document.querySelectorAll('.admin-tab').forEach(tab=>{
      tab.addEventListener('click', function(){
        document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
        this.classList.add('active');
        const name=this.dataset.tab;
        document.getElementById('admin-section-'+name).classList.add('active');
        if(name==='devices') loadDeviceList();
        else if(name==='bans') loadBans();
        else if(name==='announce') loadAdminAnnounce();
      });
    });
  }
}
function loadDeviceList() {
  const container=document.getElementById('admin-device-list');
  activeListeners.adminDevice = detach(activeListeners.adminDevice);
  activeListeners.adminDevice = db.ref('user_devices');
  activeListeners.adminDevice.on('value', snap=>{
    const data=snap.val()||{};
    let html='';
    for(let uid in data) {
      const user=data[uid];
      const latest=user.latest||{};
      const deviceName=latest.device?(latest.device.model||'Unknown'):'Unknown';
      const osName=latest.os?(latest.os.name||'Unknown'):'Unknown';
      const browserName=latest.browser?(latest.browser.name||'Unknown'):'Unknown';
      const phone=user.phone||'無電話';
      const role=user.role||'未知角色';
      const lastLogin=user.lastLogin?new Date(user.lastLogin).toLocaleString('zh-HK'):'未知';
      const historyCount=(user.history||[]).length;
      html += `<div class="admin-item" style="border-left-color:var(--gold);padding:10px;">
        <div class="title">📱 ${deviceName}</div>
        <div class="info">
          <strong>UID:</strong> ${uid.substring(0,12)}...<br>
          <strong>電話:</strong> ${phone} | <strong>角色:</strong> ${role}<br>
          <strong>系統:</strong> ${osName} | <strong>瀏覽器:</strong> ${browserName}<br>
          <strong>上次登入:</strong> ${lastLogin} | <strong>設備記錄:</strong> ${historyCount} 部
        </div>
        <button class="btn btn-secondary" style="width:auto;padding:4px 12px;font-size:13px;margin-top:4px;" onclick="showDeviceHistory('${uid}')">📋 查看歷史</button>
      </div>`;
    }
    container.innerHTML = html || '<div style="color:#888;text-align:center;padding:12px;">暫無使用者設備資料</div>';
  });
}
window.showDeviceHistory = function(uid) {
  db.ref('user_devices/'+uid).once('value', snap=>{
    const data=snap.val();
    if(!data){ showToast('無資料'); return; }
    const history=data.history||[];
    let msg='🛡️ 設備歷史紀錄\n電話: '+data.phone+'\n角色: '+data.role+'\n共 '+history.length+' 部裝置\n\n';
    history.forEach((item,idx)=>{
      const info=item.deviceInfo||{};
      const device=info.device||{};
      const os=info.os||{};
      const browser=info.browser||{};
      const time=item.timestamp?new Date(item.timestamp).toLocaleString('zh-HK'):'未知';
      msg += `${idx+1}. ${device.model||'未知'} (${os.name||'未知'})\n`;
      msg += `   ${browser.name||'未知'} · ${time}\n`;
    });
    alert(msg);
  });
};
function loadBans() {
  activeListeners.adminBans = detach(activeListeners.adminBans);
  activeListeners.adminBans = db.ref('van/banned_drivers');
  activeListeners.adminBans.on('value', snap=>{
    const data=snap.val()||{};
    let html='';
    for(let p in data) html += `<span class="badge badge-red" style="font-size:15px;padding:6px 14px;margin:3px;">${p} <span onclick="db.ref('van/banned_drivers/'+'${p}').remove();showToast('已解除')" style="cursor:pointer;">✕</span></span>`;
    document.getElementById('admin-banned-phones').innerHTML = html || '無';
  });
  activeListeners.adminBans2 = detach(activeListeners.adminBans2);
  activeListeners.adminBans2 = db.ref('van/banned_passengers');
  activeListeners.adminBans2.on('value', snap=>{
    const data=snap.val()||{};
    let html='';
    for(let n in data) html += `<span class="badge badge-red" style="font-size:15px;padding:6px 14px;margin:3px;">${n} <span onclick="db.ref('van/banned_passengers/'+'${n}').remove();showToast('已解除')" style="cursor:pointer;">✕</span></span>`;
    document.getElementById('admin-banned-passengers').innerHTML = html || '無';
  });
}
function loadAdminAnnounce() {
  activeListeners.adminAnnounce = detach(activeListeners.adminAnnounce);
  activeListeners.adminAnnounce = db.ref('van/announcements').orderByChild('timestamp').limitToLast(20);
  activeListeners.adminAnnounce.on('value', snap=>{
    const container=document.getElementById('admin-announce-list');
    let html='';
    snap.forEach(child=>{
      const ann=child.val();
      const isAudio=!!ann.audio;
      html += `<div class="admin-item" style="border-left-color:var(--gold);padding:8px 10px;">
        <div class="info">${new Date(ann.timestamp).toLocaleString('zh-HK')}</div>
        <div style="font-size:15px;">${isAudio?'🎤 [語音公告]':ann.text}</div>
        ${isAudio?`<button class="play-audio" onclick="new Audio('data:audio/webm;base64,${ann.audio}').play()">▶ 播放</button>`:''}
        <button class="btn btn-secondary" style="width:auto;padding:4px 10px;font-size:13px;" onclick="db.ref('van/announcements/'+'${child.key}').remove();showToast('已刪除')">🗑️</button>
      </div>`;
    });
    container.innerHTML = html || '<div style="color:#888;padding:8px;">暫無公告</div>';
  });
}
document.getElementById('btn-back-admin').addEventListener('click', ()=>{ detachAll(); switchView('view-lobby'); });

// ===== 公告系統 =====
function checkAnnounce() {
  activeListeners.announceBell = detach(activeListeners.announceBell);
  activeListeners.announceBell = db.ref('van/announcements').limitToLast(1);
  activeListeners.announceBell.on('value', snap=>{
    if(snap.val()){
      document.getElementById('floating-announce-btn').classList.add('has-new');
      document.getElementById('announce-bell').classList.add('has-announce');
      let latest=null; snap.forEach(c=>latest=c.val());
      if(latest) document.getElementById('announce-modal-text').textContent = latest.text||'🎤 語音公告（請播放）';
    } else {
      document.getElementById('floating-announce-btn').classList.remove('has-new');
      document.getElementById('announce-bell').classList.remove('has-announce');
    }
  });
}
function loadAnnounceList() {
  const container=document.getElementById('announce-list-content');
  db.ref('van/announcements').orderByChild('timestamp').limitToLast(20).once('value', snap=>{
    let html='';
    snap.forEach(child=>{
      const ann=child.val();
      const isAudio=!!ann.audio;
      html += `<div class="announce-item">
        <div class="time">${new Date(ann.timestamp).toLocaleString('zh-HK')}</div>
        <div class="text">${isAudio?'🎤 [語音公告]':ann.text}</div>
        ${isAudio?`<button class="play-audio" onclick="new Audio('data:audio/webm;base64,${ann.audio}').play()">▶ 播放</button>`:''}
      </div>`;
    });
    container.innerHTML = html || '<div style="text-align:center;color:#888;padding:20px;">暫無公告</div>';
  });
}
document.getElementById('floating-announce-btn').addEventListener('click', ()=>{ document.getElementById('announce-overlay').classList.add('show'); loadAnnounceList(); });
document.getElementById('announce-bell').addEventListener('click', ()=>document.getElementById('announce-modal').classList.add('active'));
document.getElementById('announce-modal-close').addEventListener('click', ()=>document.getElementById('announce-modal').classList.remove('active'));
document.getElementById('close-announce-overlay').addEventListener('click', ()=>document.getElementById('announce-overlay').classList.remove('show'));
checkAnnounce();

// ===== 閒置 15 秒（保留） =====
let idleTimer=null, idleRunning=false;
function startIdle() {
  clearTimeout(idleTimer); idleRunning=false;
  if(document.getElementById('view-driver').classList.contains('active')){
    idleRunning=true;
    idleTimer=setTimeout(()=>{
      if(document.getElementById('view-driver').classList.contains('active')){
        detachAll();
        switchView('view-passenger-list');
        loadBusList();
        showToast('閒置 15 秒，自動返回乘客頁面');
        idleRunning=false;
      }
    },15000);
  }
}
function resetIdle() {
  if(idleRunning || document.getElementById('view-driver').classList.contains('active')){
    clearTimeout(idleTimer); idleRunning=false; startIdle();
  }
}
const driverObs = new MutationObserver(()=>{
  if(document.getElementById('view-driver').classList.contains('active')) startIdle();
  else { clearTimeout(idleTimer); idleRunning=false; }
});
driverObs.observe(document.getElementById('view-driver'), { attributes:true, attributeFilter:['class'] });
document.addEventListener('touchstart', resetIdle);
document.addEventListener('click', resetIdle);
document.addEventListener('mousemove', resetIdle);

// ===== 啟動 =====
setTimeout(()=>{ if(!currentUser.uid) openLogin(); },500);
console.log('西鐵小巴 v10.0 精簡版（已移除對講機）已啟動');
</script>
