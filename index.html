xtContent=`[${item.time}] ${item.busId} (${item.sender})`;div.appendChild(info);const content=document.createElement('div');content.style.fontSize='15px';content.textContent=msg.audio?'🎤 [語音訊息]':msg.text||'';div.appendChild(content);if(msg.audio){const playBtn=document.createElement('button');playBtn.className='play-audio';playBtn.textContent='▶ 播放';playBtn.addEventListener('click',()=>window.playBoostedAudio(msg.audio,BOOST_GAIN));div.appendChild(playBtn)}const delBtn=document.createElement('button');delBtn.className='btn btn-secondary';delBtn.style.width='auto';delBtn.style.padding='4px 10px';delBtn.style.fontSize='13px';delBtn.style.marginTop='4px';delBtn.textContent='🗑️ 刪除';delBtn.addEventListener('click',()=>{if(confirm('永久刪除此訊息？')){db.ref('van/messages/'+item.key).remove().then(()=>{showToast('已刪除');if(voiceEnabled)speakCantonese('已刪除')}).catch(err=>console.warn('刪除失敗:',err))}});div.appendChild(delBtn);if(msg.hidden){const hiddenLabel=document.createElement('span');hiddenLabel.style.marginLeft='8px';hiddenLabel.style.color='var(--gold)';hiddenLabel.textContent=' [已隱藏]';div.appendChild(hiddenLabel)}fragment.appendChild(div)})}listContainer.innerHTML='';listContainer.appendChild(fragment);toggleBtn.textContent=expand?'📋 收起':`📋 顯示全部 (${allMsgData.length} 條)`}if(!toggleBtn.dataset.bound){toggleBtn.dataset.bound='true';toggleBtn.addEventListener('click',function(){msgExpanded=!msgExpanded;renderMessages(msgExpanded)})}renderMessages(false)},err=>console.warn('adminMsgRef 錯誤:',err));loadDeviceList();loadBans();loadAdminAnnounce()}

// ===== 登入事件（同 v10.25） =====
document.getElementById('admin-login-btn').addEventListener('click',async function(){
if(this.disabled)return; this.disabled=true; this.textContent='處理中...';
const username=document.getElementById('admin-username').value.trim();
const password=document.getElementById('admin-password').value.trim();
const errEl=document.getElementById('admin-login-error');
if(!username||!password){errEl.textContent='請填寫用戶名及密碼';if(voiceEnabled)speakCantonese('請填寫用戶名及密碼');this.disabled=false;this.textContent='確認';return}
try{
let user = auth.currentUser;
if(!user || !user.isAnonymous){
const cred = await auth.signInAnonymously();
user = cred.user;
} else {
await auth.updateCurrentUser(user);
}
currentUser.uid = user.uid;
const snap=await db.ref('admins/'+username).once('value');
const data=snap.val();
if(!data){errEl.textContent='管理員帳戶不存在';if(voiceEnabled)speakCantonese('管理員帳戶不存在');this.disabled=false;this.textContent='確認';return}
if(data.passwordHash===await sha256(password)){
currentUser.isAdmin=true; currentUser.phone=username;
document.getElementById('login-modal').classList.remove('active');
document.getElementById('btn-admin-panel').style.display='block';
showToast('✅ 管理員登入成功'); if(voiceEnabled)speakCantonese('管理員登入成功');
await saveDeviceInfoWithIP(currentUser.uid, username, 'admin');
loadAdminPanel(); initAdminWalkie();
localStorage.setItem('savedAdmin',username);
} else { errEl.textContent='密碼錯誤'; if(voiceEnabled)speakCantonese('密碼錯誤'); }
} catch(e){ errEl.textContent='錯誤：'+e.message; if(voiceEnabled)speakCantonese('登入失敗'); }
this.disabled=false; this.textContent='確認';
});
document.getElementById('user-login-btn').addEventListener('click',async function(){
if(this.disabled)return; this.disabled=true; this.textContent='處理中...';
const phone=document.getElementById('user-phone').value.trim();
const errEl=document.getElementById('user-login-error');
if(!phone||!/^\d{8,}$/.test(phone)){errEl.textContent='請輸入8位數字電話';if(voiceEnabled)speakCantonese('請輸入8位數字電話');this.disabled=false;this.textContent='確認';return}
try{
let user = auth.currentUser;
if(!user || !user.isAnonymous){
const cred = await auth.signInAnonymously();
user = cred.user;
} else {
await auth.updateCurrentUser(user);
}
currentUser.uid = user.uid; currentUser.phone=phone; currentUser.isAdmin=false;
await db.ref('users/'+currentUser.uid).set({phone, role:'passenger', lastLogin:Date.now()});
await saveDeviceInfoWithIP(currentUser.uid, phone, 'passenger');
document.getElementById('login-modal').classList.remove('active');
document.getElementById('btn-admin-panel').style.display='none';
showToast('登入成功'); if(voiceEnabled)speakCantonese('登入成功');
localStorage.setItem('savedPhone',phone);
showView('view-lobby');
} catch(e){ errEl.textContent='登入失敗：'+e.message; if(voiceEnabled)speakCantonese('登入失敗'); }
this.disabled=false; this.textContent='確認';
});
auth.onAuthStateChanged(async(user)=>{
if(user && user.isAnonymous){
try{
const snap=await db.ref('users/'+user.uid).once('value');
const data=snap.val();
if(data){ currentUser.uid=user.uid; currentUser.phone=data.phone||''; }
const adminSnap=await db.ref('admins').once('value');
let isAdmin=false;
adminSnap.forEach(c=>{ if(c.key===currentUser.phone) isAdmin=true; });
currentUser.isAdmin=isAdmin;
if(isAdmin){ document.getElementById('btn-admin-panel').style.display='block'; initAdminWalkie(); }
} catch(e){ console.warn('onAuthStateChanged 錯誤:',e); }
}
});
