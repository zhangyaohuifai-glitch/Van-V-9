<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>西鐵小巴 v9.0 · 靚聲終極版</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #0f0f0f; --card: #1c1c1e; --gold: #ffcc00;
  --blue: #0a84ff; --red: #ff453a; --green: #30d158;
  --purple: #bf5af2; --orange: #ff9500; --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
body { background:var(--bg); color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.header { padding:10px; text-align:center; border-bottom:1px solid #333; flex-shrink:0; position:relative; }
.title { font-size:28px; font-weight:800; color:var(--gold); }
.dev-tag { font-size:14px; color:#aaa; cursor:pointer; }
.global-voice-toggle { position:absolute; top:8px; right:10px; width:44px; height:44px; border-radius:50%; background:var(--green); border:none; color:#fff; font-size:22px; cursor:pointer; }
.global-voice-toggle.muted { background:var(--red); }
.view { display:none; flex:1; overflow-y:auto; padding:12px; flex-direction:column; }
.view.active { display:flex; }
.card { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; border:1px solid #333; }
.btn { width:100%; padding:14px; border-radius:14px; font-size:20px; font-weight:700; border:none; cursor:pointer; color:#fff; margin-bottom:8px; transition:0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn:active { opacity:0.8; transform:scale(0.97); }
.btn-portal { background:linear-gradient(135deg,#0a84ff,#0066cc); }
.btn-driver { background:linear-gradient(135deg,#ff453a,#c62828); }
.btn-secondary { background:#3a3a3c; }
.btn-warn { background:#ff9f0a; color:#000; }
.btn-green { background:var(--green); }
.btn-red { background:var(--red); }
.btn-purple { background:var(--purple); }
.row { display:flex; gap:10px; margin-bottom:8px; }
.row > * { flex:1; }
.badge { display:inline-block; padding:6px 16px; border-radius:20px; font-weight:700; font-size:16px; margin:4px; }
.badge-red { background:var(--red); } .badge-blue { background:var(--blue); } .badge-purple { background:var(--purple); }
.big-number { font-size:48px; font-weight:800; text-align:center; margin:4px 0; color:var(--gold); }
.station-name { font-size:28px; font-weight:700; text-align:center; margin:4px 0; color:var(--gold); }
.msg-area { background:#1a1a1a; border-radius:14px; padding:12px; margin-top:8px; }
.msg-list { max-height:200px; overflow-y:auto; margin-bottom:8px; font-size:15px; }
.msg-row { display:flex; gap:8px; align-items:center; padding:6px 0; border-bottom:1px solid #333; flex-wrap:wrap; }
.msg-input { flex:1; padding:12px; border-radius:12px; border:none; font-size:16px; background:#2c2c2e; color:#fff; min-width:100px; }
.record-btn, .send-btn { width:48px; height:48px; border-radius:14px; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.record-btn { background:#ff9f0a; color:#000; font-size:22px; }
.record-btn.recording { background:#ff0000; color:#fff; animation:pulse 0.6s infinite; }
.send-btn { background:var(--blue); color:#fff; font-size:16px; font-weight:700; }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 24px; border-radius:30px; font-size:16px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:90%; }
.toast.show { opacity:1; }
.login-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.login-modal.active { display:flex; }
.login-card { background:#1c1c1e; border:2px solid var(--gold); border-radius:20px; padding:24px; max-width:400px; width:100%; text-align:center; }
.login-card input { width:100%; padding:14px; margin:8px 0; border-radius:12px; border:none; font-size:18px; background:#2c2c2e; color:#fff; }
.route-strip { display:flex; overflow-x:auto; gap:12px; padding:8px 0; border-top:1px solid #333; margin-top:8px; }
.dot-node { flex:0 0 80px; text-align:center; font-size:12px; transition:all 0.3s; }
.dot { width:24px; height:24px; border-radius:50%; background:#444; margin:0 auto 4px; border:2px solid #555; transition:all 0.3s; }
.dot-node.current .dot { background:var(--green); box-shadow:0 0 14px var(--green); border-color:#fff; }
.dot-node.current span { color:#fff; font-weight:700; }
.dot-node.next .dot { background:var(--green); animation:blink 0.8s infinite; border-color:#fff; }
.dot-node.next span { color:var(--green); font-weight:600; }
.dot-node.passed .dot { background:#666; border-color:#888; }
.dot-node.passed span { color:#888; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.play-audio { background:var(--blue); color:#fff; border:none; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:13px; }
.admin-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.admin-tab { flex:1; min-width:60px; padding:10px 6px; background:#2c2c2e; border:none; color:#888; border-radius:12px; cursor:pointer; font-size:14px; font-weight:700; transition:0.3s; }
.admin-tab.active { background:var(--gold); color:#000; }
.admin-section { display:none; }
.admin-section.active { display:block; }
.admin-stat-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.admin-stat-card { background:#2c2c2e; border-radius:12px; padding:10px; text-align:center; }
.admin-stat-card .label { font-size:12px; color:#888; }
.admin-stat-card .value { font-size:24px; font-weight:800; color:var(--gold); }
.admin-item { background:#2c2c2e; border-radius:10px; padding:10px; margin-bottom:6px; border-left:3px solid var(--blue); }
.admin-item .title { font-size:16px; font-weight:700; color:var(--gold); }
.admin-item .info { font-size:13px; color:#ccc; margin-top:2px; }
.admin-input { flex:1; padding:12px; border-radius:10px; border:none; font-size:16px; background:#2c2c2e; color:#fff; min-width:60px; }
.floating-announce { position:fixed; bottom:80px; right:16px; width:52px; height:52px; border-radius:50%; background:var(--green); border:none; color:#fff; font-size:24px; cursor:pointer; z-index:15; box-shadow:0 4px 14px rgba(0,0,0,0.4); }
.floating-announce.has-new { background:var(--orange); animation:pulse-orange 1s infinite; }
@keyframes pulse-orange { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
.announce-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:30; display:none; flex-direction:column; padding:16px; }
.announce-overlay.show { display:flex; }
.announce-list { flex:1; overflow-y:auto; background:#1a1a1a; border-radius:14px; padding:12px; margin-top:8px; }
.announce-item { background:#2c2c2e; border-radius:10px; padding:10px; margin-bottom:8px; border-left:3px solid var(--gold); }
.announce-item .time { font-size:11px; color:#888; }
.announce-item .text { font-size:15px; }
.announce-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:40; display:none; align-items:center; justify-content:center; padding:20px; }
.announce-modal.active { display:flex; }
.announce-modal .modal-card { background:#2c1a3a; border:2px solid var(--gold); border-radius:20px; padding:24px; max-width:400px; width:100%; text-align:center; }
.announce-modal .modal-text { font-size:20px; color:#fff; margin-bottom:12px; }
.announce-modal .close-btn { background:var(--gold); color:#000; border:none; padding:10px 20px; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; }
.announce-bell { position:fixed; top:10px; right:64px; z-index:30; background:#333; color:#fff; border:none; border-radius:50%; width:40px; height:40px; font-size:20px; display:none; align-items:center; justify-content:center; cursor:pointer; }
.announce-bell.has-announce { display:flex; background:#ffcc00; color:#000; }
.announce-bell .dot-badge { position:absolute; top:-2px; right:-2px; background:#ff0000; border-radius:50%; width:10px; height:10px; }
.msg-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20; display:none; flex-direction:column; padding:16px; }
.msg-overlay.show { display:flex; }
.overlay-btn { position:fixed; bottom:20px; right:20px; background:var(--gold); color:#000; border:none; border-radius:24px; padding:12px 20px; font-weight:800; font-size:18px; box-shadow:0 4px 14px rgba(255,204,0,0.3); z-index:10; }
</style>
</head>
<body>

<div class="header">
  <div class="title">西鐵小巴 v9.0</div>
  <div class="dev-tag" id="dev-tag">開發者：大輝</div>
  <button class="global-voice-toggle" id="global-voice-btn">🔊</button>
</div>

<button class="floating-announce" id="floating-announce-btn">📢</button>
<button class="announce-bell" id="announce-bell">🔔<span class="dot-badge"></span></button>
<div class="announce-overlay" id="announce-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:22px;font-weight:bold;">📢 公告</span>
    <button class="btn btn-secondary" style="width:auto;padding:8px 16px;font-size:16px;" id="close-announce-overlay">✕</button>
  </div>
  <div class="announce-list" id="announce-list-content"><div style="text-align:center;color:#888;padding:20px;">暫無公告</div></div>
</div>
<div class="announce-modal" id="announce-modal">
  <div class="modal-card"><div class="modal-text" id="announce-modal-text"></div><button class="close-btn" id="announce-modal-close">關閉</button></div>
</div>

<div class="login-modal" id="login-modal">
  <div class="login-card">
    <h2 style="color:var(--gold);margin-bottom:16px;">🔐 登入</h2>
    <div id="login-choice">
      <button class="btn btn-portal" id="login-as-admin">👑 管理員</button>
      <button class="btn btn-green" id="login-as-user">🧍 乘客/司機</button>
    </div>
    <div id="admin-login-form" style="display:none;">
      <input type="text" id="admin-username" placeholder="管理員名稱">
      <input type="password" id="admin-password" placeholder="密碼">
      <button class="btn btn-warn" id="admin-login-btn">確認</button>
      <button class="btn btn-secondary" id="admin-login-back">返回</button>
      <div id="admin-login-error" style="color:var(--red);margin-top:8px;font-size:15px;"></div>
    </div>
    <div id="user-login-form" style="display:none;">
      <input type="tel" id="user-phone" placeholder="電話號碼 (8位數字)">
      <button class="btn btn-green" id="user-login-btn">確認</button>
      <button class="btn btn-secondary" id="user-login-back">返回</button>
      <div id="user-login-error" style="color:var(--red);margin-top:8px;"></div>
    </div>
    <button class="btn btn-secondary" id="login-cancel">取消</button>
  </div>
</div>

<div id="view-lobby" class="view active">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:18px;font-weight:bold;color:var(--gold);">📋 使用說明</span>
      <button class="btn" style="width:auto;padding:8px 16px;background:var(--gold);color:#000;font-size:16px;" id="btn-guide-voice">🔊 聆聽教學</button>
    </div>
    <div style="margin-top:8px;color:#ccc;line-height:1.6;font-size:15px;">
      🚏 司機：登入→輸入車牌→開始當值→自動GPS報站<br>
      🧍 乘客：登入→揀車追蹤→語音報站同步<br>
      👑 管理員：登入→全面後台管理
    </div>
  </div>
  <button class="btn btn-portal" id="btn-passenger">🧍 乘客入口</button>
  <button class="btn btn-driver" id="btn-driver">🚏 司機入口</button>
  <button class="btn btn-warn" id="btn-generate-qr">📱 分享二維碼</button>
  <button class="btn btn-purple" id="btn-admin-panel" style="display:none;">👑 總管後台</button>
  <button class="btn btn-secondary" id="btn-logout">🚪 登出</button>
  <div id="qr-box" class="card" style="display:none;"></div>
</div>

<div id="view-passenger-list" class="view">
  <h2 style="text-align:center;font-size:20px;">🚐 線上小巴</h2>
  <div id="bus-list-container" style="margin:8px 0;">載入中…</div>
  <button class="btn btn-secondary" id="btn-back-list">返回大堂</button>
</div>

<div id="view-passenger" class="view">
  <button id="voice-toggle" class="btn" style="background:#ff9f0a;color:#000;font-size:18px;">🔊 開啟廣東話報站</button>
  <div class="card" id="pass-data-card">讀取中…</div>
  <div class="route-strip" id="pass-route-strip"></div>
  <div class="msg-area">
    <div class="msg-list" id="pass-msg-list"></div>
    <div class="msg-row">
      <button class="record-btn" id="btn-pass-record">🎤<span class="record-timer" id="pass-timer" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:10px;display:none;">0s</span></button>
      <input id="pass-msg-input" class="msg-input" placeholder="訊息…">
      <button class="send-btn" id="btn-pass-send">發</button>
    </div>
    <button class="btn btn-secondary" style="font-size:16px;padding:10px;" id="btn-pass-clear">清除訊息</button>
  </div>
  <button class="btn btn-secondary" id="btn-back-track">返回列表</button>
</div>

<div id="view-driver" class="view">
  <div id="driver-panel" style="display:flex;flex-direction:column;gap:8px;">
    <div class="card" style="text-align:center;padding:12px;">
      <div style="font-size:16px;color:#aaa;" id="d-info">🚐 未登入 | 車牌: -</div>
      <div style="margin:6px 0;">
        <span class="badge badge-purple" id="d-mode-badge">繁忙時段</span>
        <span class="badge badge-red" id="d-dir-badge">往元朗</span>
      </div>
      <div class="station-name" id="d-station">大棠黃泥墩</div>
      <div class="target-station" id="d-target" style="font-size:18px;color:var(--gold);">下一站：大棠山路</div>
    </div>
    <div class="card" style="text-align:center;padding:10px;">
      <div style="font-size:18px;color:#aaa;">目前乘客</div>
      <div class="big-number" id="d-pass-count">0</div>
      <div class="row"><button class="btn btn-green" id="btn-add-pass" style="font-size:22px;padding:12px;">＋ 乘客</button><button class="btn btn-red" id="btn-sub-pass" style="font-size:22px;padding:12px;">－ 乘客</button></div>
    </div>
    <div class="row"><button class="btn btn-portal" id="btn-prev" style="font-size:20px;padding:12px;">◀ 上一站</button><button class="btn btn-portal" id="btn-next" style="font-size:20px;padding:12px;">下一站 ▶</button></div>
    <div class="row"><button class="btn" id="d-full-btn" style="font-size:18px;padding:12px;background:var(--green);">🚫 滿座</button><button class="btn btn-secondary" id="d-car-btn" style="font-size:18px;padding:12px;">16座</button></div>
    <div class="row"><button class="btn btn-secondary" id="btn-switch-dir" style="font-size:18px;padding:12px;">🔄 調頭</button><button class="btn" id="btn-mode-toggle" style="background:#bf5af2;font-size:18px;padding:12px;">切換路線</button></div>
    <button class="btn btn-green" id="start-gps" style="font-size:20px;padding:14px;">🟢 開始當值 (GPS)</button>
    <button class="btn btn-red" id="stop-gps" style="font-size:20px;padding:14px;display:none;">🔴 停止當值</button>
    <div class="route-strip" id="d-route-strip"></div>
    <div class="msg-area">
      <div class="msg-list" id="driver-msg-list"></div>
      <div class="msg-row">
        <button class="record-btn" id="btn-driver-record">🎤<span class="record-timer" id="driver-timer" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:10px;display:none;">0s</span></button>
        <input id="driver-msg-input" class="msg-input" placeholder="廣播訊息…">
        <button class="send-btn" id="btn-driver-send">發</button>
      </div>
      <button class="btn btn-secondary" style="font-size:16px;padding:10px;" id="btn-driver-clear">清除訊息</button>
    </div>
    <button class="btn btn-secondary" id="btn-driver-back">返回大堂</button>
  </div>
  <button class="overlay-btn" id="float-msg-btn">💬 訊息</button>
</div>

<div class="msg-overlay" id="msg-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:20px;font-weight:bold;">📨 乘客訊息</span>
    <button class="btn btn-secondary" style="width:auto;padding:8px 16px;font-size:16px;" id="close-msg-overlay">✕</button>
  </div>
  <div class="msg-list" id="driver-msg-list-overlay" style="flex:1;background:#1a1a1a;border-radius:14px;padding:10px;"></div>
  <div class="msg-row" style="margin-top:8px;">
    <button class="record-btn" id="btn-driver-record-overlay">🎤<span class="record-timer" id="driver-timer-overlay" style="position:absolute;top:-6px;right:-6px;background:#ff0000;color:#fff;border-radius:8px;padding:2px 6px;font-size:10px;display:none;">0s</span></button>
    <input id="driver-msg-input-overlay" class="msg-input" placeholder="廣播訊息…">
    <button class="send-btn" id="btn-driver-send-overlay">發</button>
  </div>
  <button class="btn btn-secondary" style="font-size:16px;padding:10px;" id="btn-driver-clear-overlay">清除訊息</button>
</div>

<div id="view-admin" class="view">
  <div class="card" style="border:2px solid var(--gold);background:#1a0a2e;">
    <h2 style="color:var(--gold);text-align:center;font-size:22px;">🛡️ 總管後台</h2>
    <div class="admin-stat-grid">
      <div class="admin-stat-card"><div class="label">🚐 在線</div><div class="value" id="admin-active-count">0</div></div>
      <div class="admin-stat-card"><div class="label">👥 乘客</div><div class="value" id="admin-passenger-count">0</div></div>
      <div class="admin-stat-card"><div class="label">💬 訊息</div><div class="value" id="admin-msg-count">0</div></div>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="monitor">📡 監控</button>
      <button class="admin-tab" data-tab="bans">🚫 封鎖</button>
      <button class="admin-tab" data-tab="kick">👢 踢出</button>
      <button class="admin-tab" data-tab="announce">📢 公告</button>
      <button class="admin-tab" data-tab="broadcast">📨 廣播</button>
    </div>
    <div class="admin-section active" id="admin-section-monitor">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:16px;font-weight:700;color:var(--gold);">📡 即時訊息</span>
        <button class="btn btn-secondary" style="width:auto;padding:4px 12px;font-size:12px;" id="btn-clear-all-msgs">🗑️ 全部清除</button>
      </div>
      <div id="admin-msg-list" style="max-height:300px;overflow-y:auto;background:#1a1a1a;border-radius:10px;padding:8px;"></div>
    </div>
    <div class="admin-section" id="admin-section-bans">
      <div style="font-size:16px;font-weight:700;color:var(--gold);margin-bottom:6px;">🚫 封鎖使用者</div>
      <div class="row"><input id="admin-ban-phone" class="admin-input" placeholder="封鎖司機 (電話)"><button class="btn btn-warn" id="btn-ban-phone" style="width:auto;padding:12px 16px;font-size:14px;">封鎖</button></div>
      <div class="row"><input id="admin-ban-pass" class="admin-input" placeholder="封鎖乘客 (名稱)"><button class="btn btn-warn" id="btn-ban-passenger" style="width:auto;padding:12px 16px;font-size:14px;">封鎖</button></div>
      <div style="margin-top:8px;"><span style="color:#aaa;font-size:14px;">已封鎖司機：</span><span id="admin-banned-phones" style="font-size:14px;"></span></div>
      <div><span style="color:#aaa;font-size:14px;">已封鎖乘客：</span><span id="admin-banned-passengers" style="font-size:14px;"></span></div>
    </div>
    <div class="admin-section" id="admin-section-kick">
      <div style="font-size:16px;font-weight:700;color:var(--red);margin-bottom:6px;">👢 強制踢出</div>
      <div class="row"><input id="admin-kick-vehicle" class="admin-input" placeholder="車牌 或 電話"><button class="btn btn-red" id="btn-kick-vehicle" style="width:auto;padding:12px 16px;font-size:14px;">🚐 踢走車輛</button></div>

function showToast(msg) {

function encodeBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
function decodeBase64(str) { try { return atob(str); } catch(e) { return ''; } }

// ===== 靚聲語音系統（直接採用 v8.6 嘅引擎） =====
let speechSynth = window.speechSynthesis;
let voiceEnabled = true;
let utterance = null;
let preferredVoice = null;

// 自動揀選最好聽嘅語音（優先 Google / Microsoft 女聲）
function getPreferredVoice() {
    if (preferredVoice) return preferredVoice;
    const voices = speechSynth.getVoices();
    if (!voices || voices.length === 0) return null;
    
    // 優先：廣東話女聲 -> 普通話女聲 -> 任何中文
    const candidates = voices.filter(v => 
        (v.lang.startsWith('zh') || v.lang.startsWith('cmn')) &&
        (v.name.includes('Female') || v.name.includes('女') || 
         v.name.includes('Google') || v.name.includes('Microsoft') || 
         v.name.includes('自然') || v.name.includes('Zira'))
    );
    
    if (candidates.length > 0) {
        const top = candidates.find(v => 
            v.name.includes('Google') || v.name.includes('Microsoft') || 
            v.name.includes('自然') || v.name.includes('Zira')
        );
        preferredVoice = top || candidates[0];
    } else {
        const anyChinese = voices.find(v => v.lang.startsWith('zh'));
        preferredVoice = anyChinese || null;
    }
    return preferredVoice;
}

// 預載語音
if (speechSynth) {
    speechSynth.onvoiceschanged = () => { getPreferredVoice(); };
    if (speechSynth.getVoices().length > 0) getPreferredVoice();
}

document.getElementById('global-voice-btn').addEventListener('click', function() {
  voiceEnabled = !voiceEnabled;
  this.textContent = voiceEnabled ? '🔊' : '🔇';
  this.classList.toggle('muted');
  showToast(voiceEnabled ? '語音已開啟' : '語音已關閉');
});

// 播報文字（靚聲版）
function speakText(text, lang = 'zh-HK') {
  if (!voiceEnabled || !speechSynth) return Promise.resolve();
  return new Promise((resolve) => {
    if (utterance) speechSynth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    const voice = getPreferredVoice();
    if (voice) utter.voice = voice;
    utter.rate = 0.9;
    utter.pitch = 1;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    speechSynth.speak(utter);
  });
}

// 順序播報（到達 + 下一站）
async function speakArrivalAndNext(currentStation, nextStation) {
  if (!voiceEnabled) return;
  // 先報到達
  await speakText(`到達 ${currentStation}`);
  // 延遲 2 秒再報下一站
  setTimeout(() => {
    if (nextStation) {
      speakText(`下一站 ${nextStation}`);
    } else {
      speakText('已到達總站');
    }
  }, 2000);
}

// ===== 前進到下一站（連語音） =====
async function goToNextStation() {
  const route = getRoute();
  if (driverData.stationIndex < route.length - 1) {
    driverData.stationIndex++;
    updateDriverDB();
    const currentStation = route[driverData.stationIndex];
    const nextIdx = driverData.stationIndex + 1;
    const nextStation = nextIdx < route.length ? route[nextIdx] : null;
    await speakArrivalAndNext(currentStation, nextStation);
  } else {
    showToast('已到總站，自動調頭');
    driverData.direction = driverData.direction === 0 ? 1 : 0;
    driverData.stationIndex = 0;
    updateDriverDB();
    speakText('已調頭，返回起點');
  }
}

// ===== 上一站（連語音） =====
async function goToPrevStation() {
  const route = getRoute();
  if (driverData.stationIndex > 0) {
    driverData.stationIndex--;
    updateDriverDB();
    const currentStation = route[driverData.stationIndex];
    const nextIdx = driverData.stationIndex + 1;
    const nextStation = nextIdx < route.length ? route[nextIdx] : null;
    await speakArrivalAndNext(currentStation, nextStation);
  } else {
    showToast('已係起點');
  }
}

function updateDriverUI() {
  const route = getRoute();
  const idx = driverData.stationIndex || 0;
  const station = route[idx] || '未知';
  const nextIdx = idx+1 < route.length ? idx+1 : 0;
  const nextStation = route[nextIdx] || '終點';

function renderDriverRouteStrip() {
  const strip = document.getElementById('d-route-strip');
  strip.innerHTML = '';
  const route = getRoute();
  const idx = driverData.stationIndex || 0;
  route.forEach((name, i) => {
    const node = document.createElement('div');
    node.className = 'dot-node';
    if (i < idx) node.classList.add('passed');
    else if (i === idx) node.classList.add('current');
    else if (i === idx + 1) node.classList.add('next');
    node.innerHTML = `<div class="dot"></div><span>${name.length>6?name.slice(0,6)+'…':name}</span>`;
    strip.appendChild(node);
  });
}

function updateDriverDB() {
  const route = getRoute();
  const idx = driverData.stationIndex || 0;
  const currentStation = route[idx] || '未知';
  const nextIdx = idx+1 < route.length ? idx+1 : 0;
  const nextStation = route[nextIdx] || '終點';
  const data = {
    plate: driverData.plate,
    mode: driverData.mode,
    direction: driverData.direction,
    stationIndex: idx,
    currentStation: currentStation,
    nextStation: nextStation,
    passengerCount: driverData.passengerCount,
    isActive: driverData.isActive,
    carSeats: driverData.carSeats,
    isFull: driverData.isFull,
    lastUpdate: Date.now()
  };
  if (driverData.plate) {
    db.ref('van/active_buses/'+driverData.plate).update(data);
  }
  updateDriverUI();
}

// ===== 乘客功能（簡化，保留原有） =====
function loadBusList() {
  const container = document.getElementById('bus-list-container');
  container.innerHTML = '載入中…';
  if (busListRef) busListRef.off();
  busListRef = db.ref('van/active_buses');
  busListRef.on('value', snap => {
    const data = snap.val() || {};
    let html = '', count = 0;
    for (const plate in data) {
      const bus = data[plate];
      if (Date.now() - bus.lastUpdate > 60000) continue;
      count++;
      html += `<div class="card" style="padding:12px;">
        <div style="font-size:22px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div>
        <div style="font-size:15px;color:#ccc;">${bus.currentStation||'未知'} · 👥 ${bus.passengerCount||0}人</div>
        <button class="btn btn-portal" style="margin-top:6px;font-size:16px;padding:10px;" data-plate="${plate}">追蹤</button>
      </div>`;
    }
    container.innerHTML = count === 0 ? '<div style="text-align:center;color:#888;">沒有活躍車輛</div>' : html;
    container.querySelectorAll('[data-plate]').forEach(btn => {
      btn.addEventListener('click', () => trackBus(btn.dataset.plate));
    });
  });
}
function trackBus(plate) {
  currentBusId = plate;
  showView('view-passenger');
  const card = document.getElementById('pass-data-card');
  card.innerHTML = '讀取中…';
  if (passengerMsgRef) passengerMsgRef.off();
  const busRef = db.ref('van/active_buses/' + plate);
  busRef.on('value', snap => {
    const bus = snap.val();
    if (!bus) { card.innerHTML = '車輛已離線'; return; }
    card.innerHTML = `
      <div style="font-size:22px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div>
      <div class="station-name">${bus.currentStation||'未知'}</div>
      <div style="font-size:16px;color:var(--gold);">下一站：${bus.nextStation||'無'}</div>
      <div style="font-size:15px;">方向：${bus.direction===0?'往元朗':'往大棠'} · 👥 ${bus.passengerCount||0}人</div>
    `;
    renderPassRouteStrip(bus);
  });
  passengerMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(plate);
  passengerMsgRef.on('value', snap => {
    const list = document.getElementById('pass-msg-list');
    list.innerHTML = '';
    snap.forEach(child => {
      const msg = child.val();
      const div = document.createElement('div');
      div.className = 'msg-row';
      if (msg.audio) {
        const btn = document.createElement('button');
        btn.className = 'play-audio';
        btn.textContent = '▶ 語音';
        btn.addEventListener('click', () => new Audio('data:audio/webm;base64,'+msg.audio).play());
        div.appendChild(btn);
        div.appendChild(document.createTextNode(msg.senderPhone||''));
      } else {
        div.textContent = (msg.senderPhone||'') + ': ' + (msg.text||'(訊息)');
      }
      list.appendChild(div);
    });
  });
}
function renderPassRouteStrip(bus) {
  const strip = document.getElementById('pass-route-strip');
  strip.innerHTML = '';
  const route = bus.mode === 'busy' ? BUSY : NORMAL;
  const current = bus.stationIndex || 0;
  route.forEach((name, idx) => {
    const node = document.createElement('div');
    node.className = 'dot-node';
    if (idx < current) node.classList.add('passed');
    else if (idx === current) node.classList.add('current');
    else if (idx === current + 1) node.classList.add('next');
    node.innerHTML = `<div class="dot"></div><span>${name.length>6?name.slice(0,6)+'…':name}</span>`;
    strip.appendChild(node);
  });
}
document.getElementById('btn-pass-send').addEventListener('click', () => {

  if (!text || !currentBusId) return;

document.getElementById('btn-pass-clear').addEventListener('click', () => {

// 錄音功能（簡化）
let mediaRecorder = null, audioChunks = [], recordingTimer = null, recSeconds = 0;
function startRecording(btn, timerEl, callback) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('不支援錄音'); return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        if (callback) callback(base64);
        showToast('錄音完成');
      };
      reader.readAsDataURL(blob);
      btn.classList.remove('recording');
      if (timerEl) { timerEl.style.display = 'none'; timerEl.textContent = '0s'; }
      clearInterval(recordingTimer);
      recordingTimer = null;
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    recSeconds = 0;
    if (timerEl) { timerEl.style.display = 'block'; timerEl.textContent = '0s'; }
    recordingTimer = setInterval(() => {
      recSeconds++;
      if (timerEl) timerEl.textContent = recSeconds + 's';
    }, 1000);
  }).catch(err => showToast('無法開啟咪高峰'));
}
function stopRecording(btn, timerEl) {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
}
function bindRecordBtn(btnId, timerId, callback) {
  const btn = document.getElementById(btnId);
  const timer = document.getElementById(timerId);
  let longPress = null;
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    longPress = setTimeout(() => startRecording(btn, timer, callback), 500);
  });
  btn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    clearTimeout(longPress);
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(btn, timer);
  });
  btn.addEventListener('pointerleave', () => {
    clearTimeout(longPress);
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording(btn, timer);
  });
}

function initDriverPanel() {
  if (!driverData.plate) {
    const plate = prompt('請輸入車牌號碼 (例如：AB1234)');
    if (plate) driverData.plate = plate.toUpperCase();
    else { showToast('必須輸入車牌'); showView('view-lobby'); return; }
  }
  if (driverMsgRef) driverMsgRef.off();
  const busRef = db.ref('van/active_buses/' + driverData.plate);
  busRef.on('value', snap => {
    const data = snap.val();
    if (data) {
      driverData.mode = data.mode || 'busy';
      driverData.direction = data.direction || 0;
      driverData.stationIndex = data.stationIndex || 0;
      driverData.passengerCount = data.passengerCount || 0;
      driverData.isActive = data.isActive || false;
      driverData.carSeats = data.carSeats || 16;
      driverData.isFull = data.isFull || false;
      updateDriverUI();
    }
  });
  driverMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(driverData.plate);
  driverMsgRef.on('value', snap => {
    ['driver-msg-list','driver-msg-list-overlay'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = '';
        snap.forEach(child => {
          const msg = child.val();
          const div = document.createElement('div');
          div.className = 'msg-row';
          if (msg.audio) {
            const btn = document.createElement('button');
            btn.className = 'play-audio';
            btn.textContent = '▶ 語音';
            btn.addEventListener('click', () => new Audio('data:audio/webm;base64,'+msg.audio).play());
            div.appendChild(btn);
          } else {
            div.textContent = msg.text || '(訊息)';
          }
          el.appendChild(div);
        });
      }
    });
  });
  updateDriverUI();
  document.getElementById('start-gps').style.display = driverData.isActive ? 'none' : 'block';
  document.getElementById('stop-gps').style.display = driverData.isActive ? 'block' : 'none';
}

// ===== 開始當值（高精準度 GPS + 自動報站） =====
document.getElementById('start-gps').addEventListener('click', () => {
  if (!driverData.plate) { showToast('請先設定車牌'); return; }
  if (!navigator.geolocation) {
    showToast('瀏覽器不支援 GPS');
    return;
  }
  // 高精準度 GPS
  gpsWatchId = navigator.geolocation.watchPosition(
    (position) => {
      console.log('GPS 更新:', position.coords.latitude, position.coords.longitude);
    },
    (error) => {
      console.warn('GPS 錯誤:', error);
      showToast('GPS 定位中，使用模擬模式');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
  );
  
  driverData.isActive = true;
  updateDriverDB();
  if (gpsInterval) clearInterval(gpsInterval);
  // 每 15 秒自動前進一站
  gpsInterval = setInterval(() => {
    if (driverData.isActive) {
      goToNextStation();
    }
  }, 15000);
  
  document.getElementById('start-gps').style.display = 'none';
  document.getElementById('stop-gps').style.display = 'block';
  showToast('🟢 已開始當值，GPS 追蹤中');
  speakText('開始當值，GPS 定位完成');
});

document.getElementById('stop-gps').addEventListener('click', () => {
  driverData.isActive = false;
  if (gpsInterval) { clearInterval(gpsInterval); gpsInterval = null; }
  if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  updateDriverDB();
  document.getElementById('start-gps').style.display = 'block';
  document.getElementById('stop-gps').style.display = 'none';
  showToast('🔴 已停止當值');
  speakText('已停止當值');
});

      msgCount++;

        <button class="btn btn-secondary" style="width:auto;padding:2px 8px;font-size:11px;margin-top:2px;" onclick="db.ref('van/messages/'+'${child.key}').remove();showToast('已刪除')">🗑️</button>
      </div>`;
    });

          db.ref('van/messages').orderByChild('busId').equalTo(plate).once('value', s => {

        found = true;
        showToast('已踢走車輛 '+plate);
