function encodeBase64(str) {
  const encoder = new TextEncoder();
  const bytes = encoder.encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}
function decodeBase64(str) {
  try { const binary = atob(str); const bytes = Uint8Array.from(binary, c => c.charCodeAt(0)); return new TextDecoder().decode(bytes); } catch(e) { return ''; }
}
function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function collectDeviceInfo() {
  try {
    const parser = new UAParser(); const result = parser.getResult();
    const raw = { device: result.device || { model: 'Unknown', type: 'Unknown' }, os: result.os || { name: 'Unknown', version: 'Unknown' }, browser: result.browser || { name: 'Unknown', version: 'Unknown' }, screen: { width: window.screen.width, height: window.screen.height }, language: navigator.language || 'Unknown', timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown', userAgent: navigator.userAgent || 'Unknown', timestamp: Date.now() };
    return JSON.parse(JSON.stringify(raw));
  } catch(e) { return { device: { model: 'Error' }, os: { name: 'Error' }, browser: { name: 'Error' }, screen: { width:0, height:0 }, language:'Error', timezone:'Error', userAgent:'Error', timestamp:Date.now() }; }
}
async function saveDeviceInfo(uid, phone, role) {
  if (!uid) return;
  const deviceInfo = collectDeviceInfo();
  const deviceRef = db.ref('user_devices/' + uid);
  try {
    const snap = await deviceRef.once('value'); const existing = snap.val() || {};
    let history = existing.history || [];
    const currentFingerprint = JSON.stringify(deviceInfo);
    const isDuplicate = history.some(item => JSON.stringify(item.deviceInfo) === currentFingerprint);
    if (!isDuplicate) { history.push({ deviceInfo, phone, role, timestamp: Date.now() }); if (history.length > 10) history = history.slice(-10); }
    await deviceRef.set({ latest: deviceInfo, phone, role, lastLogin: Date.now(), history });
  } catch(e) { console.warn('儲存設備指紋失敗:', e); }
}

// ==================== 語音系統（含隊列） ====================
let preferredVoice = null, voiceEnabled = true;
let speechQueue = [];
let isSpeaking = false;

function processSpeechQueue() {
  if (isSpeaking || speechQueue.length === 0) return;
  isSpeaking = true;
  const text = speechQueue.shift();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-HK'; utter.rate = 0.9; utter.pitch = 1.0;
  const voice = getCantoneseVoice(); if (voice) utter.voice = voice;
  utter.onend = () => { isSpeaking = false; processSpeechQueue(); };
  utter.onerror = () => { isSpeaking = false; processSpeechQueue(); };
  window.speechSynthesis.speak(utter);
}

function speakCantonese(text) {
  if (!voiceEnabled || !window.speechSynthesis) return Promise.resolve();
  speechQueue.push(text);
  processSpeechQueue();
  return Promise.resolve();
}

function stopAllMedia() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll('audio').forEach(audio => { if (!audio.paused) { audio.pause(); audio.currentTime = 0; } });
  speechQueue = [];
  isSpeaking = false;
}
document.getElementById('global-voice-btn').addEventListener('click', function() {
  voiceEnabled = !voiceEnabled;
  this.textContent = voiceEnabled ? '🔊' : '🔇';
  this.classList.toggle('muted');
  showToast(voiceEnabled ? '語音已開啟' : '語音已關閉');
  if (!voiceEnabled) stopAllMedia();
});

function getCantoneseVoice() {
  if (preferredVoice) { const allVoices = window.speechSynthesis.getVoices(); if (allVoices.some(v => v.voiceURI === preferredVoice.voiceURI)) return preferredVoice; preferredVoice = null; }
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices(); if (!voices || voices.length === 0) return null;
  const priorityOrder = [
    (v) => v.lang === 'zh-HK' && v.name.includes('Google'),
    (v) => v.lang === 'zh-HK' && v.name.includes('Microsoft'),
    (v) => v.lang === 'zh-HK' && (v.name.includes('自然') || v.name.includes('Ting-Ting')),
    (v) => v.lang === 'zh-HK',
    (v) => v.lang.startsWith('zh')
  ];
  for (const condition of priorityOrder) { const found = voices.find(condition); if (found) { preferredVoice = found; return found; } }
  return null;
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { getCantoneseVoice(); }; if (window.speechSynthesis.getVoices().length > 0) getCantoneseVoice(); }

}

// ==================== 乘客功能（保持不變） ====================
function loadBusList() {
  isBusListActive = true;
  const container = document.getElementById('bus-list-container'); container.innerHTML = '載入中…';
  if (busListRef) busListRef.off();
  busListRef = db.ref('van/active_buses');
  busListRef.on('value', snap => {
    if (!isBusListActive) return;
    const data = snap.val() || {}; let html = '', count = 0;
    for (const plate in data) { const bus = data[plate]; if (Date.now() - bus.lastUpdate > 60000) continue; count++; html += `<div class="card" style="padding:14px;"><div style="font-size:24px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div><div style="font-size:17px;color:#ccc;">${bus.currentStation||'未知'} · 👥 ${bus.passengerCount||0}人</div><button class="btn btn-portal" style="margin-top:8px;font-size:20px;padding:14px;" data-plate="${plate}">追蹤</button></div>`; }
    container.innerHTML = count === 0 ? '<div style="text-align:center;color:#888;font-size:18px;">沒有活躍車輛</div>' : html;
    container.querySelectorAll('[data-plate]').forEach(btn => { btn.addEventListener('click', () => trackBus(btn.dataset.plate)); });
  });
}
function trackBus(plate) {
  isBusListActive = false; if (currentBusRef) currentBusRef.off(); if (passengerMsgRef) passengerMsgRef.off();
  currentBusId = plate; showView('view-passenger'); const card = document.getElementById('pass-data-card'); card.innerHTML = '讀取中…'; passengerLastStationIndex = -1;
  currentBusRef = db.ref('van/active_buses/' + plate);
  currentBusRef.on('value', snap => {
    const bus = snap.val(); if (!bus) { card.innerHTML = '車輛已離線'; return; }
    const currentIdx = bus.stationIndex || 0; const route = bus.mode === 'busy' ? BUSY : NORMAL;
    const currentStation = getStationSafe(route, currentIdx);
    const nextIdx = currentIdx + 1 < route.length ? currentIdx + 1 : 0;
    const nextStation = getStationSafe(route, nextIdx);
    card.innerHTML = `<div style="font-size:24px;font-weight:bold;color:var(--gold);">🚐 ${plate}</div><div class="station-name">${currentStation}</div><div style="font-size:18px;color:var(--gold);">下一站：${nextStation}</div><div style="font-size:17px;">方向：${bus.direction===0?'往元朗':'往大棠'} · 👥 ${bus.passengerCount||0}人</div>`;
    renderPassRouteStrip(bus);
    if (passengerVoiceEnabled && currentIdx !== passengerLastStationIndex) { passengerLastStationIndex = currentIdx; speakCantonese('到達 ' + currentStation); if (nextStation !== '終點') setTimeout(() => speakCantonese('下一站 ' + nextStation), 2000); else setTimeout(() => speakCantonese('已到達總站'), 2000); }
  });
  passengerMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(plate);
  passengerMsgRef.on('value', snap => renderMsgList('pass-msg-list', snap));
}
function renderMsgList(listId, snap) {
  const list = document.getElementById(listId); if (!list) return;
  list.innerHTML = '';
  snap.forEach(child => {
    const msg = child.val(); const div = document.createElement('div'); div.className = 'msg-row';
    if (msg.audio) {
      const btn = document.createElement('button'); btn.className = 'play-audio'; btn.textContent = '▶ 語音';
      btn.addEventListener('click', () => { const aud = new Audio('data:audio/webm;base64,' + msg.audio); aud.volume = 1.0; aud.play(); });
      div.appendChild(btn); div.appendChild(document.createTextNode(msg.senderPhone||''));
    } else { div.textContent = (msg.senderPhone||'') + ': ' + (msg.text||'(訊息)'); }
    list.appendChild(div);
  });
}
function renderPassRouteStrip(bus) { const strip = document.getElementById('pass-route-strip'); strip.innerHTML = ''; const route = bus.mode === 'busy' ? BUSY : NORMAL; const current = bus.stationIndex || 0; route.forEach((name, idx) => { const node = document.createElement('div'); node.className = 'dot-node'; if (idx < current) node.classList.add('passed'); else if (idx === current) node.classList.add('current'); else if (idx === current + 1) node.classList.add('next'); node.innerHTML = `<div class="dot"></div><span>${name.length>6?name.slice(0,6)+'…':name}</span>`; strip.appendChild(node); }); }

document.getElementById('voice-toggle').addEventListener('click', function() { /* ...保持原邏輯... */ });
document.getElementById('btn-pass-send').addEventListener('click', () => { const input = document.getElementById('pass-msg-input'); const text = input.value.trim(); if (!text || !currentBusId) return; db.ref('van/messages').push({ busId:currentBusId, senderUid:currentUser.uid, senderPhone:currentUser.phone, text, timestamp:Date.now(), type:'text' }).then(() => { input.value=''; showToast('已發送'); }); });
document.getElementById('btn-pass-clear').addEventListener('click', () => { if (!confirm('清除所有訊息？')) return; db.ref('van/messages').orderByChild('busId').equalTo(currentBusId).once('value', snap => { snap.forEach(child => child.ref.remove()); showToast('已清除'); }); });
document.getElementById('btn-back-list').addEventListener('click', forceGoLobby);
document.getElementById('btn-back-track').addEventListener('click', () => { if (currentBusRef) { currentBusRef.off(); currentBusRef = null; } if (passengerMsgRef) { passengerMsgRef.off(); passengerMsgRef = null; } passengerVoiceEnabled = false; const btn = document.getElementById('voice-toggle'); if (btn) { btn.style.background = '#ff9f0a'; btn.style.color = '#000'; btn.textContent = '🔊 開啟廣東話自動報站'; } passengerLastStationIndex = -1; showView('view-passenger-list'); loadBusList(); });

// ==================== 錄音系統 ====================
let activeMediaRecorder = null, activeStream = null, recordingTimer = null;
function forceStopRecording() {
  if (activeMediaRecorder && activeMediaRecorder.state === 'recording') { activeMediaRecorder.stop(); if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; } activeMediaRecorder = null; }
  clearInterval(recordingTimer); recordingTimer = null;
  document.querySelectorAll('.record-btn.recording').forEach(btn => btn.classList.remove('recording'));
  document.querySelectorAll('.record-timer').forEach(timer => { timer.style.display = 'none'; timer.textContent = '0s'; });
}
async function startRecording(btn, timerEl, callback) {
  forceStopRecording();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('不支援錄音'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); activeStream = stream;
    const recorder = new MediaRecorder(stream); activeMediaRecorder = recorder; const chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => { const blob = new Blob(chunks, { type: 'audio/webm' }); const reader = new FileReader(); reader.onload = () => { const base64 = reader.result.split(',')[1]; if (callback) callback(base64); showToast('錄音完成'); }; reader.readAsDataURL(blob); btn.classList.remove('recording'); if (timerEl) { timerEl.style.display = 'none'; timerEl.textContent = '0s'; } clearInterval(recordingTimer); if (activeStream) { activeStream.getTracks().forEach(t => t.stop()); activeStream = null; } activeMediaRecorder = null; };
    recorder.start(); btn.classList.add('recording'); let seconds = 0; if (timerEl) { timerEl.style.display = 'block'; timerEl.textContent = '0s'; } recordingTimer = setInterval(() => { seconds++; if (timerEl) timerEl.textContent = seconds + 's'; }, 1000);
  } catch (err) { showToast('無法開啟咪高峰'); }
}
function bindRecordBtn(btnId, timerId, callback) { /* ...保持不變... */ }

bindRecordBtn('btn-pass-record', 'pass-timer', (base64) => { if (!currentBusId) return; db.ref('van/messages').push({ busId:currentBusId, senderUid:currentUser.uid, senderPhone:currentUser.phone, audio:base64, timestamp:Date.now(), type:'audio' }); });
bindRecordBtn('btn-driver-record', 'driver-timer', (base64) => { if (!driverData.plate) return; db.ref('van/messages').push({ busId:driverData.plate, senderUid:currentUser.uid, senderPhone:currentUser.phone, audio:base64, timestamp:Date.now(), type:'audio' }); });
bindRecordBtn('btn-driver-record-overlay', 'driver-timer-overlay', (base64) => { if (!driverData.plate) return; db.ref('van/messages').push({ busId:driverData.plate, senderUid:currentUser.uid, senderPhone:currentUser.phone, audio:base64, timestamp:Date.now(), type:'audio' }); });

// ==================== 司機功能 ====================
function initDriverPanel() {
  if (!driverData.plate) {
    // ✅ 手機友好輸入車牌
    showPlateInputModal();
    return;
  }
  if (driverBusRef) driverBusRef.off(); if (driverMsgRef) driverMsgRef.off();
  driverBusRef = db.ref('van/active_buses/' + driverData.plate);
  driverBusRef.on('value', snap => { const data = snap.val(); if (data) { driverData.mode = data.mode || 'busy'; driverData.direction = data.direction || 0; driverData.stationIndex = data.stationIndex || 0; driverData.passengerCount = data.passengerCount || 0; driverData.isActive = data.isActive || false; driverData.carSeats = data.carSeats || 16; driverData.isFull = data.isFull || false; updateDriverUI(); } });
  driverMsgRef = db.ref('van/messages').orderByChild('busId').equalTo(driverData.plate);
  driverMsgRef.on('value', snap => { ['driver-msg-list','driver-msg-list-overlay'].forEach(id => renderMsgList(id, snap)); });
  updateDriverUI(); document.getElementById('start-gps').style.display = driverData.isActive ? 'none' : 'block'; document.getElementById('stop-gps').style.display = driverData.isActive ? 'block' : 'none';
}

// ✅ 自定車牌輸入模態框（取代 prompt）
function showPlateInputModal() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `<div style="background:#1c1c1e;border:2px solid var(--gold);border-radius:20px;padding:24px;max-width:400px;width:100%;text-align:center;">
    <h3 style="color:var(--gold);margin-bottom:16px;">🚏 請輸入車牌號碼</h3>
    <input id="plate-input-modal" style="width:100%;padding:16px;border-radius:12px;border:none;font-size:22px;background:#2c2c2e;color:#fff;text-align:center;" placeholder="例如：AB1234" autofocus>
    <div style="margin-top:16px;display:flex;gap:12px;">
      <button id="plate-confirm" class="btn btn-portal" style="font-size:22px;padding:14px;">確認</button>
      <button id="plate-cancel" class="btn btn-secondary" style="font-size:22px;padding:14px;">取消</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('plate-input-modal').focus();
  document.getElementById('plate-confirm').addEventListener('click', () => {
    const plate = document.getElementById('plate-input-modal').value.trim().toUpperCase();
    if (plate) {
      driverData.plate = plate;
      modal.remove();
      initDriverPanel();
    } else {
      showToast('請輸入有效車牌');
    }
  });
  document.getElementById('plate-cancel').addEventListener('click', () => {
    modal.remove();
    showToast('必須輸入車牌');
    showView('view-lobby');
  });
}
