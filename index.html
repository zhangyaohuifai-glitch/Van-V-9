// ==================== 工具函數 ====================
function showToast(msg) { /* ... */ }
let lastShownView = '';
function showView(id) { if (lastShownView === id) return; lastShownView = id; document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); const target = document.getElementById(id); if (target) target.classList.add('active'); }
function encodeBase64(str) { const encoder = new TextEncoder(); const bytes = encoder.encode(str); let binary = ''; bytes.forEach(b => binary += String.fromCharCode(b)); return btoa(binary); }
function decodeBase64(str) { try { const binary = atob(str); const bytes = Uint8Array.from(binary, c => c.charCodeAt(0)); return new TextDecoder().decode(bytes); } catch(e) { return ''; } }
function calcDistance(lat1, lon1, lat2, lon2) { const R = 6371000; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); return R * c; }

// ==================== 語音系統（即時靜音） ====================
let preferredVoice = null, voiceEnabled = true;
function stopAllMedia() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll('audio').forEach(audio => { if (!audio.paused) { audio.pause(); audio.currentTime = 0; } });
}
document.getElementById('global-voice-btn').addEventListener('click', function() {
  voiceEnabled = !voiceEnabled;
  this.textContent = voiceEnabled ? '🔊' : '🔇';
  this.classList.toggle('muted');
  showToast(voiceEnabled ? '語音已開啟' : '語音已關閉');
  if (!voiceEnabled) stopAllMedia();
});

function getCantoneseVoice() {
  if (preferredVoice) { const allVoices = window.speechSynthesis.getVoices(); if (allVoices.some(v => v.voiceURI === preferredVoice.voiceURI)) return preferredVoice; preferredVoice = null; }
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;
  const priorityOrder = [
    (v) => v.lang === 'zh-HK' && v.name.includes('Google'),
    (v) => v.lang === 'zh-HK' && v.name.includes('Microsoft'),
    (v) => v.lang === 'zh-HK' && (v.name.includes('自然') || v.name.includes('Ting-Ting')),
    (v) => v.lang === 'zh-HK',
    (v) => v.lang.startsWith('zh')
  ];
  for (const condition of priorityOrder) { const found = voices.find(condition); if (found) { preferredVoice = found; return found; } }
  return null;
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = () => { getCantoneseVoice(); }; if (window.speechSynthesis.getVoices().length > 0) getCantoneseVoice(); }
function speakCantonese(text) {
  if (!voiceEnabled || !window.speechSynthesis) return Promise.resolve();
  return new Promise((resolve) => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-HK'; utter.rate = 0.9; utter.pitch = 1.0;
    const voice = getCantoneseVoice();
    if (voice) utter.voice = voice;
    utter.onend = () => resolve(); utter.onerror = () => resolve();
    window.speechSynthesis.speak(utter);
  });
}

// ==================== 錄音功能（終極防卡死） ====================
let activeMediaRecorder = null, activeStream = null, recordingTimer = null;

function forceStopRecording() {
  if (activeMediaRecorder && activeMediaRecorder.state === 'recording') {
    activeMediaRecorder.stop();
    if (activeStream) {
      activeStream.getTracks().forEach(t => t.stop());
      activeStream = null;
    }
    activeMediaRecorder = null;
  }
  clearInterval(recordingTimer);
  recordingTimer = null;
  // 強制移除所有錄音按鈕嘅 recording class
  document.querySelectorAll('.record-btn.recording').forEach(btn => {
    btn.classList.remove('recording');
  });
  document.querySelectorAll('.record-timer').forEach(timer => {
    timer.style.display = 'none';
    timer.textContent = '0s';
  });
}

async function startRecording(btn, timerEl, callback) {
  // 先確保冇任何舊錄音
  forceStopRecording();
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('不支援錄音');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    activeStream = stream;
    const recorder = new MediaRecorder(stream);
    activeMediaRecorder = recorder;
    const chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        if (callback) callback(base64);
        showToast('錄音完成');
      };
      reader.readAsDataURL(blob);
      btn.classList.remove('recording');
      if (timerEl) { timerEl.style.display = 'none'; timerEl.textContent = '0s'; }
      clearInterval(recordingTimer);
      // 釋放流
      if (activeStream) {
        activeStream.getTracks().forEach(t => t.stop());
        activeStream = null;
      }
      activeMediaRecorder = null;
    };
    recorder.start();
    btn.classList.add('recording');
    let seconds = 0;
    if (timerEl) { timerEl.style.display = 'block'; timerEl.textContent = '0s'; }
    recordingTimer = setInterval(() => {
      seconds++;
      if (timerEl) timerEl.textContent = seconds + 's';
    }, 1000);
  } catch (err) {
    showToast('無法開啟咪高峰');
  }
}

function stopRecording(btn, timerEl) {
  forceStopRecording();
  if (btn) btn.classList.remove('recording');
  if (timerEl) { timerEl.style.display = 'none'; timerEl.textContent = '0s'; }
}

function bindRecordBtn(btnId, timerId, callback) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const timer = document.getElementById(timerId);
  let longPress = null;
  
  const start = (e) => {
    e.preventDefault();
    // 避免重複觸發
    if (activeMediaRecorder && activeMediaRecorder.state === 'recording') return;
    longPress = setTimeout(() => startRecording(btn, timer, callback), 300);
  };
  const stop = (e) => {
    e.preventDefault();
    clearTimeout(longPress);
    if (activeMediaRecorder && activeMediaRecorder.state === 'recording') {
      forceStopRecording();
    }
  };
  
  // 綁多種事件確保任何情況都能停止
  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', stop);
  btn.addEventListener('pointerleave', stop);
  btn.addEventListener('pointercancel', stop);
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchstart', start, {passive: false});
  btn.addEventListener('touchend', stop, {passive: false});
}

// ==================== GPS 一鍵高精準度啟動 ====================
document.getElementById('start-gps').addEventListener('click', () => {
  if (!driverData.plate) { showToast('請先設定車牌'); return; }
  if (!navigator.geolocation) { showToast('瀏覽器不支援 GPS'); return; }
  
  // 確保上一次的 GPS 已停止
  if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  
  showToast('正在啟動高精度 GPS，請允許定位權限');
  lastReportedIndex = driverData.stationIndex;
  
  gpsWatchId = navigator.geolocation.watchPosition(
    (position) => {
      if (!driverData.isActive || !driverData.plate) return;
      const coords = getCoords(); const route = getRoute();
      if (!coords || coords.length === 0) return;
      let minDist = Infinity, nearestIdx = 0;
      for (let i = 0; i < coords.length; i++) {
        const d = calcDistance(position.coords.latitude, position.coords.longitude, coords[i].lat, coords[i].lng);
        if (d < minDist) { minDist = d; nearestIdx = i; }
      }
      if (minDist < 100 && nearestIdx !== lastReportedIndex) {
        lastReportedIndex = nearestIdx;
        driverData.stationIndex = nearestIdx;
        updateDriverDB();
        const stationName = route[nearestIdx];
        speakCantonese('到達 ' + stationName);
        const nextIdx = nearestIdx + 1;
        if (nextIdx < route.length) setTimeout(() => speakCantonese('下一站 ' + route[nextIdx]), 2000);
        else setTimeout(() => { speakCantonese('已到達總站'); driverData.direction = driverData.direction === 0 ? 1 : 0; driverData.stationIndex = 0; lastReportedIndex = -1; updateDriverDB(); showToast('已到總站，自動調頭'); }, 2500);
      }
      document.getElementById('d-gps-status').textContent = `📍 GPS 定位中 (距離最近站點 ${Math.round(minDist)}m)`;
    },
    (error) => {
      console.warn('GPS 錯誤:', error);
      showToast('GPS 定位失敗，請確認定位服務已開啟並允許瀏覽器使用位置');
    },
    { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
  );
  driverData.isActive = true;
  updateDriverDB();
  document.getElementById('start-gps').style.display = 'none';
  document.getElementById('stop-gps').style.display = 'block';
  speakCantonese('開始當值，高精度 GPS 定位已啟動');
});

document.getElementById('stop-gps').addEventListener('click', () => {
  driverData.isActive = false;
  if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  lastReportedIndex = -1;
  updateDriverDB();
  document.getElementById('start-gps').style.display = 'block';
  document.getElementById('stop-gps').style.display = 'none';
  document.getElementById('d-gps-status').textContent = '📍 GPS 已停止';
  showToast('🔴 已停止當值');
  speakCantonese('已停止當值');
});

// ==================== 對講機即時目標選單 + 群聊/單聊 ====================
function initWalkieTargetsLive(selectId, excludePlate = null) {
  const select = document.getElementById(selectId);
  if (!select) return;
  db.ref('van/active_buses').on('value', snap => {
    const data = snap.val() || {};
    let html = '<option value="all">📢 全部司機（群聊）</option>';
    for (const plate in data) {
      if (Date.now() - data[plate].lastUpdate < 60000) {
        if (excludePlate && plate === excludePlate) continue;
        html += `<option value="${plate}">🚐 ${plate}</option>`;
      }
    }
    select.innerHTML = html;
  });
}

// 司機端初始化對講機
function initWalkieTalkie() {
  if (!driverData.plate) return;
  initWalkieTargetsLive('walkie-target', driverData.plate);
  if (walkieRef) walkieRef.off();
  walkieRef = db.ref('van/walkie_talkie').orderByChild('timestamp').limitToLast(50);
  walkieRef.on('value', snap => {
    const container = document.getElementById('walkie-messages');
    let html = '';
    snap.forEach(child => {
      const msg = child.val();
      if (msg.target === 'all' || msg.target === driverData.plate || msg.senderPlate === driverData.plate) {
        const time = new Date(msg.timestamp).toLocaleTimeString('zh-HK');
        const sender = msg.senderPlate || '未知司機';
        html += `<div style="padding:4px 0;border-bottom:1px solid #333;font-size:14px;">
          <span style="color:#888;">[${time}]</span>
          <strong>${sender}</strong>:
          ${msg.audio ? `<button class="play-audio" style="font-size:12px;padding:2px 8px;" onclick="var a=new Audio('data:audio/webm;base64,${msg.audio}');a.volume=1.0;a.play()">▶ 語音</button>` : msg.text}
        </div>`;
      }
    });
    container.innerHTML = html || '<div style="color:#888;font-size:14px;">暫無對講機訊息</div>';
  });
}

// 管理員端初始化對講機
function initAdminWalkie() {
  if (!currentUser.isAdmin) return;
  initWalkieTargetsLive('admin-walkie-target');
  if (adminWalkieRef) adminWalkieRef.off();
  adminWalkieRef = db.ref('van/walkie_talkie').orderByChild('timestamp').limitToLast(50);
  adminWalkieRef.on('value', snap => {
    const container = document.getElementById('admin-walkie-messages');
    let html = '';
    snap.forEach(child => {
      const msg = child.val();
      const time = new Date(msg.timestamp).toLocaleTimeString('zh-HK');
      const sender = msg.senderPlate || '未知司機';
      const target = msg.target === 'all' ? '📢群聊' : msg.target;
      html += `<div style="padding:4px 0;border-bottom:1px solid #333;font-size:14px;">
        <span style="color:#888;">[${time}]</span>
        <strong>${sender}</strong> → ${target}:
        ${msg.audio ? `<button class="play-audio" style="font-size:12px;padding:2px 8px;" onclick="var a=new Audio('data:audio/webm;base64,${msg.audio}');a.volume=1.0;a.play()">▶ 語音</button>` : msg.text}
      </div>`;
    });
    container.innerHTML = html || '<div style="color:#888;font-size:14px;">暫無對講機訊息</div>';
  });
}

// 綁定錄音按鈕（司機及管理員）
bindRecordBtn('btn-walkie-record', 'walkie-timer', (base64) => {
